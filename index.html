
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pick Your Location · Emily Sharon Photography</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --cream:    #f7f3ec;
    --warm:     #efe6d6;
    --sage:     #8a9b80;
    --sage-dk:  #6b7c63;
    --rose:     #c89898;
    --ink:      #2b2622;
    --ink-soft: #5a504a;
    --gold:     #b89968;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; }
  h1, h2, h3 { font-family: 'Cormorant Garamond', serif; font-weight: 500; letter-spacing: -0.5px; }
  h1 { font-size: clamp(2rem, 5vw, 3.4rem); margin: 0 0 0.4em; }
  h2 { font-size: clamp(1.4rem, 3vw, 2rem); margin: 0 0 0.4em; }
  p  { line-height: 1.6; color: var(--ink-soft); margin: 0 0 1.2em; }

  .stage { max-width: 720px; margin: 0 auto; padding: 64px 24px 100px; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }

  .brand { position: fixed; top: 24px; left: 24px; font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; letter-spacing: 4px; text-transform: uppercase; color: var(--ink-soft); z-index: 200; }
  .progress { position: fixed; top: 24px; right: 24px; font-size: 0.78rem; color: var(--ink-soft); letter-spacing: 1px; z-index: 200; }
  .progress span { color: var(--ink); font-weight: 500; }

  .step { animation: fadeIn 0.45s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

  .card { background: white; border-radius: 18px; padding: 40px; box-shadow: 0 8px 30px rgba(43,38,34,0.06); }

  /* Option buttons */
  .options { display: grid; gap: 10px; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
  .option { background: var(--cream); border: 1px solid #e3dccf; border-radius: 12px; padding: 18px 12px; font-family: inherit; font-size: 1rem; color: var(--ink); cursor: pointer; transition: all 0.2s; text-align: center; }
  .option .o-label { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; }
  .option .o-sub   { font-size: 0.74rem; color: var(--ink-soft); margin-top: 4px; letter-spacing: 0.5px; }
  .option:hover    { border-color: var(--sage); transform: translateY(-1px); }
  .option.active   { background: var(--sage); color: white; border-color: var(--sage); }
  .option.active .o-sub { color: rgba(255,255,255,0.85); }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px; background: var(--ink); color: var(--cream); border: none; border-radius: 999px; font-family: inherit; font-size: 0.95rem; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; text-decoration: none; }
  .btn:hover:not(:disabled) { background: var(--sage); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary { background: transparent; color: var(--ink-soft); border: 1px solid #e3dccf; }
  .btn-secondary:hover:not(:disabled) { color: var(--ink); border-color: var(--ink-soft); background: transparent; }
  .btn-small { padding: 10px 20px; font-size: 0.78rem; }
  .btn-row { display: flex; justify-content: space-between; gap: 12px; margin-top: 28px; }

  .input { width: 100%; padding: 16px 18px; font-size: 1.05rem; font-family: inherit; border: 1px solid #e3dccf; border-radius: 12px; background: var(--cream); color: var(--ink); outline: none; transition: border-color 0.2s; }
  .input:focus { border-color: var(--sage); }
  .small-note { font-size: 0.78rem; color: var(--ink-soft); margin-top: 16px; }
  .label { display: block; font-size: 0.78rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 8px; }
  .pill { display: inline-block; padding: 4px 12px; background: var(--warm); color: var(--ink-soft); border-radius: 999px; font-size: 0.78rem; letter-spacing: 0.5px; margin-right: 6px; }

  /* ══════════════════════════════════════════
     STEP 5 — MAP (CONTAINED CARD)
  ══════════════════════════════════════════ */
  .map-card {
    background: white;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 8px 30px rgba(43,38,34,0.08);
  }

  .map-top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 18px;
    border-bottom: 1px solid #f0ebe2;
    flex-wrap: wrap;
  }
  .map-top-ctx {
    font-size: 0.84rem;
    color: var(--ink-soft);
    line-height: 1.4;
  }
  .map-top-ctx strong { color: var(--ink); }
  .map-ctx-change {
    color: var(--sage-dk);
    cursor: pointer;
    text-decoration: underline;
    font-size: 0.78rem;
    margin-left: 6px;
  }
  .map-top-right { display: flex; align-items: center; gap: 10px; }
  .grid-count { font-size: 0.82rem; color: var(--ink-soft); white-space: nowrap; }

  /* Filter dropdown */
  .filter-wrap { position: relative; }
  .filter-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 16px;
    background: var(--cream);
    border: 1px solid #e3dccf;
    border-radius: 999px;
    font-size: 0.85rem;
    color: var(--ink);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover, .filter-btn.open { border-color: var(--sage); background: white; }
  .filter-active-badge {
    background: var(--sage);
    color: white;
    border-radius: 999px;
    width: 17px; height: 17px;
    font-size: 0.68rem;
    font-weight: 700;
    display: none;
    align-items: center; justify-content: center;
  }
  .filter-active-badge.show { display: inline-flex; }

  .filter-panel {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    background: white;
    border: 1px solid #e3dccf;
    border-radius: 16px;
    padding: 8px 0 12px;
    min-width: 240px;
    max-height: 70vh;
    overflow-y: auto;
    box-shadow: 0 12px 40px rgba(43,38,34,0.12);
    z-index: 300;
    animation: fadeIn 0.15s ease;
  }
  .filter-panel.open { display: block; }
  @media (max-width: 700px) {
    .filter-panel { right: auto; left: 0; min-width: 220px; }
  }

  .filter-panel-title {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--ink-soft);
    padding: 10px 18px 6px;
    border-bottom: 1px solid #f0ebe2;
    margin-bottom: 4px;
  }

  .filter-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 18px;
    gap: 16px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .filter-row:hover { background: var(--cream); }
  .filter-row-label { font-size: 0.88rem; color: var(--ink); user-select: none; }

  /* Toggle switch */
  .toggle {
    width: 38px; height: 21px;
    background: #d1ccc5;
    border-radius: 999px;
    position: relative;
    flex-shrink: 0;
    transition: background 0.2s;
    cursor: pointer;
  }
  .toggle.on { background: var(--sage); }
  .toggle-knob {
    position: absolute;
    width: 17px; height: 17px;
    background: white;
    border-radius: 50%;
    top: 2px; left: 2px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    transition: transform 0.2s;
  }
  .toggle.on .toggle-knob { transform: translateX(17px); }

  .filter-clear-row {
    padding: 8px 18px 0;
    border-top: 1px solid #f0ebe2;
    margin-top: 4px;
    text-align: right;
  }
  .filter-clear-btn {
    background: none; border: none;
    font-family: inherit;
    font-size: 0.78rem;
    color: var(--rose);
    cursor: pointer;
    padding: 4px 0;
  }
  .filter-clear-btn:hover { text-decoration: underline; }


  /* Map card — the outer container */
  .map-card {
    background: white;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 8px 30px rgba(43,38,34,0.08);
  }

  /* Map top bar */
  .map-top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 18px;
    border-bottom: 1px solid #f0ebe2;
    flex-wrap: wrap;
  }
  .map-top-ctx { font-size: 0.82rem; color: var(--ink-soft); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .ctx-chip { display: inline-flex; align-items: center; gap: 5px; }
  .ctx-chip-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.8px; color: var(--ink-soft); opacity: 0.7; }
  .ctx-chip strong { color: var(--ink); }
  .ctx-sep { color: #d1ccc5; }
  .map-top-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; margin-left: auto; }

  /* Map + detail panel side by side */
  .map-body {
    display: flex;
    height: 400px;
    border-bottom: 1px solid #f0ebe2;
  }
  #leaflet-map { flex: 1; min-width: 0; }

  /* Detail panel (right side) */
  .loc-detail-panel {
    width: 310px;
    flex-shrink: 0;
    border-left: 1px solid #f0ebe2;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .loc-detail-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--ink-soft);
    font-style: italic;
    font-size: 0.88rem;
    text-align: center;
    padding: 24px;
    gap: 8px;
  }
  .loc-detail-empty p { margin: 0; line-height: 1.6; }
  .loc-detail-empty-icon { font-size: 2rem; opacity: 0.4; }

  /* Populated detail card */
  .detail-photo {
    width: 100%;
    height: 180px;
    object-fit: cover;
    display: block;
    flex-shrink: 0;
  }
  .detail-photo-placeholder {
    width: 100%;
    height: 180px;
    flex-shrink: 0;
    background: linear-gradient(135deg, var(--warm) 0%, var(--sage) 100%);
    display: flex; align-items: center; justify-content: center;
    color: white; font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem; text-align: center; padding: 0 16px;
  }
  .detail-info {
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  /* Action bar at bottom of card */
  .map-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 18px;
  }

  /* Shared detail text styles */
  .detail-name-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .loc-name { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; color: var(--ink); line-height: 1.2; flex: 1; }

  .fav-btn {
    background: none;
    border: 1.5px solid #e3dccf;
    border-radius: 50%;
    width: 32px; height: 32px;
    font-size: 1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    color: #c8b88a;
    transition: all 0.15s;
    padding: 0;
  }
  .fav-btn:hover { border-color: var(--gold); background: #fdf8ef; transform: scale(1.1); }
  .fav-btn.fav-active { background: var(--gold); border-color: var(--gold); color: white; }
  .loc-dist { font-size: 0.76rem; color: var(--ink-soft); }
  .loc-desc { font-size: 0.8rem; color: var(--ink-soft); line-height: 1.5; }
  .loc-time { font-size: 0.76rem; color: var(--ink-soft); }
  .loc-time-val { color: var(--gold); font-weight: 500; }

  @media (max-width: 700px) {
    /* Map page outer padding */
    .map-outer { padding: 56px 12px 80px !important; }

    /* Top bar: stack context chips above filter button */
    .map-top-bar { flex-direction: column; align-items: flex-start; gap: 8px; padding: 10px 12px; }
    .map-top-ctx { font-size: 0.78rem; }
    .map-top-right { width: 100%; justify-content: space-between; }
    .grid-count { font-size: 0.78rem; }

    /* Map stacks above detail panel */
    .map-body { flex-direction: column; height: auto; }
    #leaflet-map { height: 280px; width: 100%; }
    .loc-detail-panel { width: 100%; border-left: none; border-top: 1px solid #f0ebe2; max-height: 320px; }

    /* Detail panel photo smaller on mobile */
    .detail-photo, .detail-photo-placeholder { height: 140px; }

    /* Action bar */
    .map-actions { padding: 10px 12px; }
    .map-actions .btn { font-size: 0.82rem; padding: 11px 18px; }

    /* Photo grid 2-col on mobile */
    .photo-grid { column-count: 2; column-gap: 8px; }
    .photo-grid-section { margin-top: 32px; }
    .photo-grid-title { font-size: 1.4rem; }

    /* Steps padding */
    .stage { padding: 48px 16px 80px; }

    /* Options grid — 2 col on mobile for drive time */
    .options { grid-template-columns: repeat(2, 1fr); }
  }

  /* Accessibility badge */
  .loc-access { display: flex; align-items: flex-start; gap: 7px; flex-wrap: wrap; }
  .access-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 999px; font-size: 0.72rem; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
  .access-badge.easy     { background: #e8f5e9; color: #2e7d32; }
  .access-badge.moderate { background: #fff8e1; color: #e65100; }
  .access-badge.hard     { background: #fce4ec; color: #c62828; }
  .access-dot { width: 6px; height: 6px; border-radius: 50%; }
  .easy     .access-dot { background: #4caf50; }
  .moderate .access-dot { background: #ff9800; }
  .hard     .access-dot { background: #f44336; }
  .access-text { font-size: 0.76rem; color: var(--ink-soft); line-height: 1.4; font-style: italic; }

  /* Tags */
  .loc-tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .tag { padding: 2px 9px; border-radius: 999px; font-size: 0.7rem; letter-spacing: 0.3px; white-space: nowrap; }
  .tag.scene   { background: var(--warm); color: var(--ink-soft); }
  .tag.amenity { background: #e3f2fd; color: #1565c0; }

  /* Fees */
  .loc-fees { padding-top: 8px; border-top: 1px solid #f0ebe2; }
  .fee-badge { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 0.72rem; font-weight: 500; }
  .fee-badge.none { background: #e8f5e9; color: #2e7d32; }

  .loc-fees-list { padding-top: 8px; border-top: 1px solid #f0ebe2; display: flex; flex-direction: column; gap: 4px; }
  .fee-line { display: flex; justify-content: space-between; align-items: center; font-size: 0.76rem; }
  .fee-line-label { color: var(--ink-soft); }
  .fee-line-amount { font-weight: 600; color: var(--ink); background: #fff3e0; padding: 1px 7px; border-radius: 4px; font-size: 0.72rem; color: #c45c00; }

  .no-results { text-align: center; padding: 40px 20px; }
  .no-results h3 { font-size: 1.3rem; color: var(--ink); margin-bottom: 8px; }

  /* ══════════════════════════════════════════
     PHOTO GRID (Pinterest-style)
  ══════════════════════════════════════════ */
  .photo-grid-section {
    margin-top: 52px;
  }
  .photo-grid-header {
    margin-bottom: 24px;
  }
  .photo-grid-title {
    font-size: clamp(1.5rem, 3vw, 2.2rem);
    margin: 0 0 6px;
    color: var(--ink);
  }
  .photo-grid-sub {
    font-size: 0.9rem;
    color: var(--ink-soft);
    margin: 0;
  }

  .photo-grid {
    column-count: 3;
    column-gap: 12px;
  }
  @media (max-width: 600px) {
    .photo-grid { column-count: 2; column-gap: 8px; }
  }

  .photo-grid-loading,
  .photo-grid-empty {
    column-span: all;
    text-align: center;
    color: var(--ink-soft);
    font-style: italic;
    font-size: 0.9rem;
    padding: 32px 0;
  }

  .pg-item {
    position: relative;
    break-inside: avoid;
    margin-bottom: 12px;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    background: var(--warm);
    box-shadow: 0 2px 8px rgba(43,38,34,0.07);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .pg-item:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(43,38,34,0.14);
  }
  .pg-item:hover .pg-overlay {
    opacity: 1;
  }

  .pg-img {
    width: 100%;
    display: block;
    border-radius: 12px;
  }

  .pg-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(43,38,34,0.72) 0%, transparent 50%);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 12px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .pg-loc-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    color: white;
    line-height: 1.2;
    font-weight: 500;
  }
  .pg-loc-dist {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.75);
    margin-top: 2px;
  }

  .pg-fav-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    background: var(--gold);
    color: white;
    font-size: 0.72rem;
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }


  /* Confirmation */
  .check-row { display: flex; align-items: flex-start; gap: 10px; padding: 14px; background: var(--cream); border-radius: 10px; margin: 24px 0; cursor: pointer; }
  .check-row input { margin-top: 3px; }
  .check-row span { font-size: 0.92rem; line-height: 1.5; }
  .pay-options { display: flex; gap: 12px; margin-top: 20px; }
  .pay-options .btn { flex: 1; justify-content: center; }
  .stripe-btn { background: #635bff !important; }
  .stripe-btn:hover:not(:disabled) { background: #5048e5 !important; }
  .deposit-note { font-size: 0.85rem; color: var(--ink-soft); font-style: italic; margin-top: 10px; }
  .change-loc-btn { display: inline-flex; align-items: center; gap: 6px; margin-top: 16px; padding: 10px 20px; background: transparent; color: var(--sage-dk); border: 1px solid var(--sage); border-radius: 999px; font-family: inherit; font-size: 0.85rem; cursor: pointer; transition: all 0.15s; }
  .change-loc-btn:hover { background: var(--sage); color: white; }
</style>
</head>
<body>

<div class="brand">EMILY SHARON</div>
<div class="progress">Step <span id="step-num">1</span> of 6</div>
<div id="stage"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ===================================================================
// CONSTANTS
// ===================================================================
const SEASONS = [
  { id:'winter', label:'Winter', months:[11,12,1,2],  sub:'November – February' },
  { id:'spring', label:'Spring', months:[3,4,5],       sub:'March – May'         },
  { id:'summer', label:'Summer', months:[6,7,8],       sub:'June – August'       },
  { id:'fall',   label:'Fall',   months:[9,10],         sub:'September – October' },
];

const DRIVE_OPTS = [
  { mins:15,   label:'15 min',   sub:'close to home'       },
  { mins:30,   label:'30 min',   sub:'a quick trip'        },
  { mins:45,   label:'45 min',   sub:'happy to drive'      },
  { mins:60,   label:'1 hour',   sub:'adventure ready'     },
  { mins:90,   label:'1.5 hrs',  sub:'up for anything'     },
  { mins:9999, label:'Anywhere', sub:'show all my locations'},
];

function driveLabel() {
  return (!flow.driveMins || flow.driveMins >= 9999) ? 'Anywhere' : `${flow.driveMins} min`;
}

const STATE_NAMES = { UT:'Utah', CA:'California' };

const FILTER_DEFS = [
  // ── Features ──────────────────────────────────────────────────────
  { key:'wheelchair', label:'Wheelchair Friendly', group:'features', check: (loc, tags) => tags.some(t => t.includes('wheelchair')) },
  { key:'restrooms',  label:'Restrooms',           group:'features', check: (loc, tags) => tags.some(t => t.includes('restroom')) },
  { key:'dogs',       label:'Dogs Allowed',         group:'features', check: (loc, tags) => !tags.some(t => t.includes('dogs not allowed')) },
  { key:'outdoor',    label:'Outdoor Only',          group:'features', check: (loc, tags) => (loc.type||'').toLowerCase() === 'outdoor' },
  { key:'indoor',     label:'Indoor Only',           group:'features', check: (loc, tags) => (loc.type||'').toLowerCase() === 'indoor' },
  { key:'mountains',  label:'Mountains',            group:'features', check: (loc, tags) => tags.some(t => t.includes('mountain')) },
  { key:'water',      label:'Water',                group:'features', check: (loc, tags) => tags.some(t => t.includes('water')) },
  { key:'trees',      label:'Trees',                group:'features', check: (loc, tags) => tags.some(t => t.includes('tree')) },
  { key:'urban',      label:'Urban',                group:'features', check: (loc, tags) => tags.some(t => t.includes('urban')) },
  { key:'field',      label:'Field',                group:'features', check: (loc, tags) => tags.some(t => t.includes('field')) },
  // ── Fees (ON = exclude locations that require this fee) ────────────
  { key:'no_vehicle_pass', label:'No Vehicle Pass', group:'fees',
    check: (loc) => {
      const v = String(loc.vehiclePassAmount || '').replace(/[$,\s]/g, '');
      return !v || v === '0';
    }
  },
  { key:'no_studio_fee',   label:'No Studio Fee',   group:'fees',
    check: (loc) => {
      const v = String(loc.studioFeeAmount || '').replace(/[$,\s]/g, '');
      return !v || v === '0' || (loc.studioFeeAmount||'').toLowerCase() === 'none';
    }
  },
  { key:'no_photo_pass',   label:'No Photo Pass',   group:'fees',
    check: (loc) => {
      const v = String(loc.photoPassAmount || '').replace(/[$,\s]/g, '');
      return !v || v === '0';
    }
  },
];

async function loadLocations() {
  try {
    const r = await fetch('/api/locations');
    if (!r.ok) throw new Error(`API ${r.status}`);
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    LOCATIONS = data.locations || [];
  } catch(e) {
    console.error('Failed to load locations:', e);
    LOCATIONS = [];
  }
  return LOCATIONS;
}

// ===================================================================
// HELPERS
// ===================================================================
const $ = sel => document.querySelector(sel);
function updateProgress() { $('#step-num').textContent = flow.step; }

function haversineMiles(a, b) {
  const R = 3959, toRad = d => d * Math.PI / 180;
  const dLat = toRad(b.lat - a.lat), dLon = toRad(b.lng - a.lng);
  const x = Math.sin(dLat/2)**2 + Math.sin(dLon/2)**2 * Math.cos(toRad(a.lat)) * Math.cos(toRad(b.lat));
  return 2 * R * Math.asin(Math.sqrt(x));
}

function estimateDriveMins(a, b) {
  return (haversineMiles(a, b) * 1.4) / 50 * 60;
}

// Fallback coords used when the geocode API isn't available (e.g. local file preview)
const STATE_FALLBACK_COORDS = {
  UT: { lat: 40.2338, lng: -111.6585 }, // Provo, UT
  CA: { lat: 37.3382, lng: -121.8863 }, // San Jose, CA
};

async function geocodeCity(city, stateCode) {
  try {
    const url = '/api/geocode?' + new URLSearchParams({ city, state: stateCode });
    const r = await fetch(url);
    if (!r.ok) throw new Error(`status ${r.status}`);
    const data = await r.json();
    if (data.lat && data.lng) return { lat: data.lat, lng: data.lng };
  } catch(e) {
    console.warn('Geocode API unavailable, using state fallback:', e.message);
    // In local/preview mode the API doesn't exist — fall back to state center
    const fallback = STATE_FALLBACK_COORDS[stateCode];
    if (fallback) return { ...fallback, _isFallback: true };
  }
  return null;
}

function getPhotoForSeason(loc, seasonId) {
  if (!loc.photos || !loc.photos.length) return null;
  const s = SEASONS.find(s => s.id === seasonId);
  if (s) {
    for (const m of s.months) {
      const p = loc.photos.find(p => p.months && p.months.includes(m));
      if (p) return p;
    }
  }
  return loc.photos[0];
}

function isActiveInSeason(loc, seasonId) {
  const s = SEASONS.find(s => s.id === seasonId);
  if (!s) return true;
  if (loc.seasons && loc.seasons.length > 0) {
    return loc.seasons.some(sv => sv.toLowerCase().trim() === seasonId);
  }
  if (loc.defaultMonths && loc.defaultMonths.length > 0) {
    return loc.defaultMonths.some(m => s.months.includes(m));
  }
  return true;
}

function getAccessClass(level) {
  if (!level) return '';
  const l = level.toLowerCase();
  if (l === 'easy') return 'easy';
  if (l === 'moderate') return 'moderate';
  if (l.includes('hard') || l.includes('difficult')) return 'hard';
  return '';
}

const ZONE_TRAVEL_FEES = {
  'Zone 1': null,                  // no travel fee
  'Zone 2': '$65',
  'Zone 3': '$115',
  'Zone 4': '$160',
  'Zone 5': 'Custom (invoiced)',
};

function buildFeesHTML(loc) {
  const clean = v => String(v || '').replace(/[$,\s]/g, '');
  const fmt   = v => {
    const n = parseFloat(clean(v));
    return isNaN(n) ? String(v).trim() : `$${n.toLocaleString()}`;
  };

  const rows = [];

  // Travel fee by zone
  const zone = (loc.travelZone || '').trim();
  if (zone && zone !== 'Zone 1') {
    const amount = ZONE_TRAVEL_FEES[zone] || 'See invoice';
    rows.push({ label: 'Travel fee', amount, hasFee: true });
  }

  // Vehicle pass
  const vp = clean(loc.vehiclePassAmount);
  if (vp && vp !== '0') {
    rows.push({ label: 'Vehicle pass', amount: fmt(loc.vehiclePassAmount), hasFee: true });
  }

  // Studio fee
  const sf = clean(loc.studioFeeAmount);
  if (sf && sf !== '0' && (loc.studioFeeAmount || '').toLowerCase() !== 'none') {
    rows.push({ label: 'Studio fee', amount: fmt(loc.studioFeeAmount), hasFee: true });
  }

  // Photo pass
  const pp = clean(loc.photoPassAmount);
  if (pp && pp !== '0') {
    rows.push({ label: 'Photo pass', amount: fmt(loc.photoPassAmount), hasFee: true });
  }

  if (!rows.length) {
    return `<div class="loc-fees"><span class="fee-badge none">✓ No additional fees</span></div>`;
  }

  return `<div class="loc-fees-list">${rows.map(r =>
    `<div class="fee-line">
       <span class="fee-line-label">${r.label}</span>
       <span class="fee-line-amount">${r.amount}</span>
     </div>`
  ).join('')}</div>`;
}

function allTags(loc) {
  return [...(loc.amenityTags||[]), ...(loc.tags||[])].map(t => t.toLowerCase().trim());
}

function applyFilters(locs) {
  return locs.filter(loc => {
    const tags = allTags(loc);
    return FILTER_DEFS.every(fd => !flow.filters[fd.key] || fd.check(loc, tags));
  });
}

function activeFilterCount() {
  return Object.values(flow.filters).filter(Boolean).length;
}

// MAP
// ===================================================================
function initMap() {
  if (leafletMap) return;
  const container = document.getElementById('leaflet-map');
  if (!container) return;

  leafletMap = L.map('leaflet-map', {
    zoomControl: true,
    tap: true,          // enable tap on iOS
    tapTolerance: 15,   // more forgiving tap detection on mobile
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a> contributors',
    maxZoom: 18
  }).addTo(leafletMap);

  if (flow.cityCoords) {
    leafletMap.setView([flow.cityCoords.lat, flow.cityCoords.lng], 10);
  }

  // Force Leaflet to recalculate its container size — critical on mobile
  // where the container may not have final dimensions at init time
  setTimeout(() => {
    if (leafletMap) leafletMap.invalidateSize();
  }, 100);
  setTimeout(() => {
    if (leafletMap) leafletMap.invalidateSize();
  }, 500);
}

function destroyMap() {
  if (leafletMap) { leafletMap.remove(); leafletMap = null; mapMarkers = {}; }
  document.removeEventListener('click', closeFilterOnOutside);
}

function makeIcon(loc, selected = false) {
  const fav = flow.favorites.has(loc.id);
  // Favorited pins: gold; selected: sage-dark; normal: sage
  const c = fav ? '#b89968' : (selected ? '#6b7c63' : '#8a9b80');
  const w = selected ? 28 : 22;
  const h = selected ? 38 : 30;
  const r = selected ? 10 : 7.5;
  // Star inside the circle when favorited
  const inner = fav
    ? `<text x="14" y="18" text-anchor="middle" font-size="${selected ? 11 : 9}" fill="${selected ? '#6b7c63' : '#8a9b80'}" font-family="sans-serif">★</text>`
    : `<circle cx="14" cy="14" r="${r}" fill="white" opacity="0.9"/>`;
  const svg = `<svg width="${w}" height="${h}" viewBox="0 0 28 38" xmlns="http://www.w3.org/2000/svg">
    <path d="M14 0C6.268 0 0 6.268 0 14c0 10 14 24 14 24S28 24 28 14C28 6.268 21.732 0 14 0z" fill="${c}" stroke="white" stroke-width="1.5"/>
    ${inner}
  </svg>`;
  return L.divIcon({
    className: '',
    html: svg,
    iconSize:   [w, h],
    iconAnchor: [w / 2, h],
  });
}

function refreshView() {
  if (!flow.cityCoords) return;

  const withDrive = LOCATIONS
    .map(loc => ({ ...loc, driveMins: estimateDriveMins(flow.cityCoords, loc), miles: haversineMiles(flow.cityCoords, loc) }))
    .filter(loc => loc.lat && loc.lng)
    .filter(loc => isActiveInSeason(loc, flow.season))
    .filter(loc => flow.driveMins >= 9999 || loc.driveMins <= flow.driveMins)
    .sort((a, b) => a.driveMins - b.driveMins);

  currentFiltered = applyFilters(withDrive);

  const countEl = $('#grid-count');
  if (countEl) countEl.textContent = `${currentFiltered.length} spot${currentFiltered.length !== 1 ? 's' : ''} found`;

  if (leafletMap) {
    Object.values(mapMarkers).forEach(m => m.remove());
    mapMarkers = {};
    currentFiltered.forEach(loc => {
      const marker = L.marker([loc.lat, loc.lng], { icon: makeIcon(loc) })
        .addTo(leafletMap)
        .on('click', () => selectLocation(loc.id));
      mapMarkers[loc.id] = marker;
    });
    if (currentFiltered.length > 0) {
      leafletMap.fitBounds(L.latLngBounds(currentFiltered.map(l => [l.lat, l.lng])), { padding: [40, 40] });
    }
  }

  // If selected location filtered out, reset
  if (flow.pickedLocation && !currentFiltered.find(l => l.id === flow.pickedLocation.id)) {
    flow.pickedLocation = null;
    resetDetail();
  }

  // Rebuild photo grid
  buildPhotoGrid(currentFiltered);
}

function buildPhotoGrid(locs) {
  const container = $('#photo-grid');
  if (!container) return;

  // Collect all photos across filtered locations, tagged with their location
  const items = [];
  locs.forEach(loc => {
    const photos = loc.photos && loc.photos.length ? loc.photos : [];
    // Pick the season-best photo first, then any others (dedupe by id)
    const best = getPhotoForSeason(loc, flow.season);
    const ordered = best
      ? [best, ...photos.filter(p => p.id !== best.id)]
      : photos;
    ordered.forEach(p => {
      items.push({ photo: p, loc });
    });
  });

  if (!items.length) {
    container.innerHTML = `<p class="photo-grid-empty">No photos available for these locations yet.</p>`;
    return;
  }

  // Shuffle so it doesn't always look the same order
  for (let i = items.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [items[i], items[j]] = [items[j], items[i]];
  }

  container.innerHTML = items.map(({ photo, loc }) => {
    const isFav = flow.favorites.has(loc.id);
    const caption = (photo.caption || loc.name).replace(/"/g, '&quot;').replace(/</g, '&lt;');
    return `
      <div class="pg-item" data-locid="${loc.id}" title="${caption}">
        <img class="pg-img" src="${photo.url}" alt="${caption}" loading="lazy" />
        <div class="pg-overlay">
          <div class="pg-loc-name">${loc.name}</div>
          <div class="pg-loc-dist">~${Math.round(loc.driveMins)} min away</div>
        </div>
        ${isFav ? '<div class="pg-fav-badge">★</div>' : ''}
      </div>`;
  }).join('');

  // Wire clicks
  container.querySelectorAll('.pg-item').forEach(item => {
    item.addEventListener('click', () => {
      const id = item.dataset.locid;
      selectLocation(id);
      // Scroll back up to the map card
      const mapCard = document.querySelector('.map-card');
      if (mapCard) mapCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });
}

function buildDetailHTML(loc) {
  const photo = getPhotoForSeason(loc, flow.season);
  const photoHTML = photo
    ? `<img class="detail-photo" src="${photo.url}" alt="${(photo.caption || loc.name).replace(/"/g, '&quot;')}" />`
    : `<div class="detail-photo-placeholder">${loc.name}</div>`;

  const lvl = getAccessClass(loc.accessibilityLevel);
  const accessBadge = loc.accessibilityLevel
    ? `<span class="access-badge ${lvl}"><span class="access-dot"></span>${loc.accessibilityLevel}</span>` : '';
  const accessText = loc.accessibility
    ? `<span class="access-text">${loc.accessibility}</span>` : '';
  const accessHTML = (accessBadge || accessText) ? `<div class="loc-access" style="margin-top:2px;">${accessBadge}${accessText}</div>` : '';

  const sceneTags = (loc.tags || []).filter(Boolean).map(t => `<span class="tag scene">${t}</span>`).join('');
  const amenTags  = (loc.amenityTags || []).filter(Boolean).map(t => `<span class="tag amenity">${t}</span>`).join('');
  const tagsHTML  = (sceneTags || amenTags) ? `<div class="loc-tags">${sceneTags}${amenTags}</div>` : '';

  const feesHTML = buildFeesHTML(loc);

  const desc = (loc.description || loc.notes || '').trim();

  const isFav = flow.favorites.has(loc.id);

  return `
    ${photoHTML}
    <div class="detail-info">
      <div class="detail-name-row">
        <div class="loc-name">${loc.name}</div>
        <button class="fav-btn ${isFav ? 'fav-active' : ''}" id="fav-btn" title="${isFav ? 'Remove from favorites' : 'Save to favorites'}">
          ${isFav ? '★' : '☆'}
        </button>
      </div>
      <div class="loc-dist">~${Math.round(loc.driveMins)} min · ${Math.round(loc.miles)} mi from ${flow.city}</div>
      ${desc ? `<div class="loc-desc">${desc}</div>` : ''}
      ${loc.bestTimeOfDay ? `<div class="loc-time">🕐 <span class="loc-time-val">${loc.bestTimeOfDay}</span></div>` : ''}
      ${accessHTML}
      ${tagsHTML}
      ${feesHTML}
    </div>`;
}

function selectLocation(id) {
  const loc = currentFiltered.find(l => l.id === id);
  if (!loc) return;
  flow.pickedLocation = loc;

  // Update pins
  Object.entries(mapMarkers).forEach(([mid, marker]) => {
    const l = currentFiltered.find(x => x.id === mid);
    if (l) marker.setIcon(makeIcon(l, mid === id));
  });

  // Fly to location
  if (leafletMap && loc.lat && loc.lng) {
    leafletMap.flyTo([loc.lat, loc.lng], 13, { duration: 0.7 });
  }

  // Show detail panel
  const panel = $('#loc-detail');
  if (panel) {
    panel.innerHTML = buildDetailHTML(loc);
    // Wire favorite button
    const favBtn = panel.querySelector('#fav-btn');
    if (favBtn) favBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleFavorite(loc.id); });
  }

  // Enable pick button
  const btn = $('#next-map');
  if (btn) btn.disabled = false;
}

function resetDetail() {
  const panel = $('#loc-detail');
  if (panel) panel.innerHTML = `<div class="loc-detail-empty"><div class="loc-detail-empty-icon">📍</div><p>Click a pin on the map<br>to explore a location</p></div>`;
  const btn = $('#next-map'); if (btn) btn.disabled = true;
}

function toggleFavorite(id) {
  if (flow.favorites.has(id)) {
    flow.favorites.delete(id);
  } else {
    flow.favorites.add(id);
  }
  // Refresh the pin icon
  const loc = currentFiltered.find(l => l.id === id);
  if (loc && mapMarkers[id]) {
    mapMarkers[id].setIcon(makeIcon(loc, flow.pickedLocation?.id === id));
  }
  // Update the fav button in the detail panel
  const favBtn = $('#fav-btn');
  if (favBtn) {
    const isFav = flow.favorites.has(id);
    favBtn.textContent = isFav ? '★ Unfavorite' : '☆ Favorite';
    favBtn.classList.toggle('fav-active', isFav);
  }
}

function updateFilterBadge() {
  const n = activeFilterCount();
  const badge = $('#filter-badge');
  if (badge) { badge.textContent = n; badge.classList.toggle('show', n > 0); }
}

// ===================================================================
// STEP 6 — Confirmation + Payment
// ===================================================================
function renderStep6() {
  flow.step = 6; updateProgress();
  destroyMap();
  document.getElementById('stage').style.cssText = '';
  const loc = flow.pickedLocation;
  const seasonLabel = SEASONS.find(s => s.id === flow.season)?.label || '';

  document.getElementById('stage').innerHTML = `
    <div class="stage">
      <div class="step">
        <div class="card">
          <h2>Good choice! ✨</h2>
          <p>Your booking is updated with <strong>${loc.name}</strong>.</p>
          <p>
            <span class="pill">${loc.type || 'outdoor'}</span>
            <span class="pill">${seasonLabel}</span>
            <span class="pill">~${Math.round(loc.driveMins)} min from ${flow.city}</span>
          </p>
          ${loc.accessibility ? `<p style="font-size:0.9rem;color:var(--sage-dk);">♿ ${loc.accessibility}</p>` : ''}
          ${(loc.description||loc.notes) ? `<p style="font-style:italic;font-size:0.9rem;">${loc.description||loc.notes}</p>` : ''}
          <button class="change-loc-btn" id="change-loc">← Change my location</button>
        </div>

        <div class="card" style="margin-top:20px;">
          <h2>Last step — secure your booking</h2>
          <p>Pay your <strong>$50 deposit</strong> to lock in your spot. The remainder is due when you receive your photos.</p>
          <label class="check-row">
            <input type="checkbox" id="terms" />
            <span>I agree to the <a href="#" onclick="alert('Contract coming soon'); return false;">terms &amp; conditions</a> and photoshoot contract.</span>
          </label>
          <div class="pay-options">
            <button class="btn stripe-btn" id="pay-stripe" disabled>Pay $50 with Stripe</button>
          </div>
          <p class="deposit-note">Once your deposit is paid, you'll receive a confirmation text with the Google Maps link, parking info, and an outfit guide.</p>
        </div>
      </div>
    </div>`;

  $('#change-loc').addEventListener('click', () => renderStep5map());
  $('#terms').addEventListener('change', e => {
    flow.termsAccepted = e.target.checked;
    $('#pay-stripe').disabled = !flow.termsAccepted;
  });
  $('#pay-stripe').addEventListener('click', () => alert('This will redirect to your Stripe Payment Link.'));
}

// ===================================================================
// INIT
// ===================================================================
renderStep1();
</script>
