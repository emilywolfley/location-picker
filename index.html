
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pick Your Location · Emily Sharon Photography</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:    #f7f3ec;
    --warm:     #efe6d6;
    --sage:     #8a9b80;
    --sage-dk:  #6b7c63;
    --rose:     #c89898;
    --ink:      #2b2622;
    --ink-soft: #5a504a;
    --gold:     #b89968;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; }
  h1, h2, h3 { font-family: 'Cormorant Garamond', serif; font-weight: 500; letter-spacing: -0.5px; }
  h1 { font-size: clamp(2rem, 5vw, 3.4rem); margin: 0 0 0.4em; }
  h2 { font-size: clamp(1.4rem, 3vw, 2rem); margin: 0 0 0.4em; }
  p  { line-height: 1.6; color: var(--ink-soft); margin: 0 0 1.2em; }

  .stage { max-width: 720px; margin: 0 auto; padding: 64px 24px 100px; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
  .stage--wide { max-width: 1200px; padding-bottom: 120px; }

  .brand { position: fixed; top: 24px; left: 24px; font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; letter-spacing: 4px; text-transform: uppercase; color: var(--ink-soft); z-index: 200; }
  .progress { position: fixed; top: 24px; right: 24px; font-size: 0.78rem; color: var(--ink-soft); letter-spacing: 1px; z-index: 200; }
  .progress span { color: var(--ink); font-weight: 500; }

  .step { animation: fadeIn 0.45s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

  .card { background: white; border-radius: 18px; padding: 40px; box-shadow: 0 8px 30px rgba(43,38,34,0.06); }

  /* Option buttons */
  .options { display: grid; gap: 10px; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
  .option { background: var(--cream); border: 1px solid #e3dccf; border-radius: 12px; padding: 18px 12px; font-family: inherit; font-size: 1rem; color: var(--ink); cursor: pointer; transition: all 0.2s; text-align: center; }
  .option .o-label { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; }
  .option .o-sub   { font-size: 0.74rem; color: var(--ink-soft); margin-top: 4px; letter-spacing: 0.5px; }
  .option:hover    { border-color: var(--sage); transform: translateY(-1px); }
  .option.active   { background: var(--sage); color: white; border-color: var(--sage); }
  .option.active .o-sub { color: rgba(255,255,255,0.85); }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px; background: var(--ink); color: var(--cream); border: none; border-radius: 999px; font-family: inherit; font-size: 0.95rem; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; text-decoration: none; }
  .btn:hover:not(:disabled) { background: var(--sage); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary { background: transparent; color: var(--ink-soft); border: 1px solid #e3dccf; }
  .btn-secondary:hover:not(:disabled) { color: var(--ink); border-color: var(--ink-soft); background: transparent; }
  .btn-small { padding: 10px 20px; font-size: 0.78rem; }
  .btn-row { display: flex; justify-content: space-between; gap: 12px; margin-top: 28px; }

  .input { width: 100%; padding: 16px 18px; font-size: 1.05rem; font-family: inherit; border: 1px solid #e3dccf; border-radius: 12px; background: var(--cream); color: var(--ink); outline: none; transition: border-color 0.2s; }
  .input:focus { border-color: var(--sage); }
  .small-note { font-size: 0.78rem; color: var(--ink-soft); margin-top: 16px; }
  .label { display: block; font-size: 0.78rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 8px; }
  .pill { display: inline-block; padding: 4px 12px; background: var(--warm); color: var(--ink-soft); border-radius: 999px; font-size: 0.78rem; letter-spacing: 0.5px; margin-right: 6px; }

  /* ── LOCATION GRID ── */
  .grid-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
  .grid-count { font-size: 0.88rem; color: var(--ink-soft); }
  .grid-right { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  .drive-select { padding: 10px 14px; font-size: 0.88rem; font-family: inherit; border: 1px solid #e3dccf; border-radius: 999px; background: white; color: var(--ink); outline: none; cursor: pointer; }
  .drive-select:focus { border-color: var(--sage); }

  /* Filter button */
  .filter-btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px; background: white; border: 1px solid #e3dccf; border-radius: 999px; font-size: 0.88rem; color: var(--ink); cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .filter-btn:hover, .filter-btn.open { border-color: var(--sage); background: var(--cream); }
  .filter-count-badge { background: var(--sage); color: white; border-radius: 999px; width: 18px; height: 18px; font-size: 0.7rem; display: none; align-items: center; justify-content: center; font-weight: 600; }
  .filter-count-badge.visible { display: inline-flex; }

  /* Filter panel */
  .filter-panel { background: white; border: 1px solid #e3dccf; border-radius: 16px; padding: 20px 24px 16px; margin-bottom: 20px; box-shadow: 0 8px 30px rgba(43,38,34,0.08); display: none; animation: fadeIn 0.2s ease; }
  .filter-panel.open { display: block; }
  .filter-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
  .filter-item-label { font-size: 0.74rem; text-transform: uppercase; letter-spacing: 1.2px; color: var(--ink-soft); margin-bottom: 8px; }
  .toggle-group { display: flex; gap: 6px; }
  .toggle-btn { padding: 6px 16px; background: var(--cream); border: 1px solid #e3dccf; border-radius: 999px; font-size: 0.82rem; font-family: inherit; color: var(--ink-soft); cursor: pointer; transition: all 0.15s; }
  .toggle-btn:hover { border-color: var(--sage); color: var(--ink); }
  .toggle-btn.yes { background: #e8f5e9; border-color: #81c784; color: #2e7d32; font-weight: 500; }
  .toggle-btn.no  { background: #fce4ec; border-color: #ef9a9a; color: #c62828; font-weight: 500; }
  .filter-footer { margin-top: 14px; padding-top: 12px; border-top: 1px solid #f0ebe2; text-align: right; }

  /* Location card grid */
  .loc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
  @media (max-width: 680px) { .loc-grid { grid-template-columns: 1fr; } }

  .loc-card {
    background: white; border-radius: 16px; overflow: hidden;
    box-shadow: 0 4px 20px rgba(43,38,34,0.07); cursor: pointer;
    transition: all 0.2s; border: 2px solid transparent;
    display: flex; flex-direction: column;
  }
  .loc-card:hover { transform: translateY(-3px); box-shadow: 0 10px 32px rgba(43,38,34,0.13); }
  .loc-card.selected { border-color: var(--sage); box-shadow: 0 0 0 4px rgba(138,155,128,0.18); }

  .loc-photo { width: 100%; height: 200px; object-fit: cover; display: block; }
  .loc-photo-placeholder { width: 100%; height: 200px; background: linear-gradient(135deg, var(--warm) 0%, var(--sage) 100%); display: flex; align-items: center; justify-content: center; color: white; font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; text-align: center; padding: 0 16px; }

  .loc-body { padding: 18px 20px 20px; flex: 1; display: flex; flex-direction: column; gap: 10px; }
  .loc-name { font-family: 'Cormorant Garamond', serif; font-size: 1.35rem; color: var(--ink); line-height: 1.2; }
  .loc-dist { font-size: 0.8rem; color: var(--ink-soft); }
  .loc-desc { font-size: 0.85rem; color: var(--ink-soft); line-height: 1.55; }
  .loc-time { font-size: 0.8rem; color: var(--ink-soft); }
  .loc-time-val { color: var(--gold); font-weight: 500; }

  /* Accessibility */
  .loc-access { display: flex; align-items: flex-start; gap: 8px; flex-wrap: wrap; }
  .access-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 11px; border-radius: 999px; font-size: 0.74rem; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
  .access-badge.easy     { background: #e8f5e9; color: #2e7d32; }
  .access-badge.moderate { background: #fff8e1; color: #e65100; }
  .access-badge.hard     { background: #fce4ec; color: #c62828; }
  .access-dot { width: 7px; height: 7px; border-radius: 50%; }
  .easy     .access-dot { background: #4caf50; }
  .moderate .access-dot { background: #ff9800; }
  .hard     .access-dot { background: #f44336; }
  .access-text { font-size: 0.78rem; color: var(--ink-soft); line-height: 1.4; font-style: italic; }

  /* Tags */
  .loc-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { padding: 3px 10px; border-radius: 999px; font-size: 0.72rem; letter-spacing: 0.3px; white-space: nowrap; }
  .tag.scene   { background: var(--warm); color: var(--ink-soft); }
  .tag.amenity { background: #e3f2fd; color: #1565c0; }

  /* Fees */
  .loc-fees { margin-top: auto; padding-top: 12px; border-top: 1px solid #f0ebe2; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; font-size: 0.78rem; }
  .fees-label { font-weight: 500; color: var(--ink); }
  .fee-badge { padding: 2px 9px; border-radius: 4px; font-size: 0.72rem; font-weight: 500; }
  .fee-badge.none    { background: #e8f5e9; color: #2e7d32; }
  .fee-badge.has-fee { background: #fff3e0; color: #e65100; }

  /* Sticky pick bar */
  .pick-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(247,243,236,0.96); backdrop-filter: blur(10px); border-top: 1px solid #e3dccf; padding: 14px 24px; display: flex; justify-content: center; z-index: 100; }
  .pick-bar-inner { display: flex; justify-content: space-between; align-items: center; gap: 12px; max-width: 1200px; width: 100%; }
  .pick-bar-info { font-size: 0.88rem; color: var(--ink-soft); }
  .pick-bar-info strong { color: var(--ink); }

  .no-results { grid-column: 1 / -1; text-align: center; padding: 60px 20px; }
  .no-results h3 { font-size: 1.4rem; color: var(--ink); margin-bottom: 8px; }

  /* Confirmation */
  .check-row { display: flex; align-items: flex-start; gap: 10px; padding: 14px; background: var(--cream); border-radius: 10px; margin: 24px 0; cursor: pointer; }
  .check-row input { margin-top: 3px; }
  .check-row span { font-size: 0.92rem; line-height: 1.5; }
  .pay-options { display: flex; gap: 12px; margin-top: 20px; }
  .pay-options .btn { flex: 1; justify-content: center; }
  .stripe-btn { background: #635bff !important; }
  .stripe-btn:hover:not(:disabled) { background: #5048e5 !important; }
  .deposit-note { font-size: 0.85rem; color: var(--ink-soft); font-style: italic; margin-top: 10px; }
  .change-loc-btn { display: inline-flex; align-items: center; gap: 6px; margin-top: 16px; padding: 10px 20px; background: transparent; color: var(--sage-dk); border: 1px solid var(--sage); border-radius: 999px; font-family: inherit; font-size: 0.85rem; cursor: pointer; transition: all 0.15s; }
  .change-loc-btn:hover { background: var(--sage); color: white; }
</style>
</head>
<body>

<div class="brand">EMILY SHARON</div>
<div class="progress">Step <span id="step-num">1</span> of 5</div>
<div class="stage" id="stage"></div>

<script>
// ===================================================================
// CONSTANTS
// ===================================================================
const SEASONS = [
  { id:'winter', label:'Winter', months:[11,12,1,2],  sub:'November – February' },
  { id:'spring', label:'Spring', months:[3,4,5],       sub:'March – May'         },
  { id:'summer', label:'Summer', months:[6,7,8],       sub:'June – August'       },
  { id:'fall',   label:'Fall',   months:[9,10],         sub:'September – October' },
];

const DRIVE_OPTS = [
  { mins:15, label:'15 min', sub:'close to home'  },
  { mins:30, label:'30 min', sub:'a quick trip'   },
  { mins:45, label:'45 min', sub:'happy to drive' },
  { mins:60, label:'1 hour', sub:'adventure ready'},
  { mins:90, label:'1.5 hrs',sub:'go anywhere'    },
];

const STATE_NAMES = { UT:'Utah', CA:'California' };

const FILTER_DEFS = [
  { key:'wheelchair', label:'Wheelchair Friendly' },
  { key:'restrooms',  label:'Restrooms'            },
  { key:'dogs',       label:'Dogs Allowed'          },
  { key:'indoor',     label:'Indoor'                },
  { key:'outdoor',    label:'Outdoor'               },
  { key:'mountains',  label:'Mountains'             },
];

// ===================================================================
// STATE
// ===================================================================
let LOCATIONS = [];
const dataPromise = loadLocations();

const flow = {
  step: 1,
  state:  null,   // 'UT' | 'CA'
  season: null,   // 'winter' | 'spring' | 'summer' | 'fall'
  city:   null,
  cityCoords: null,
  driveMins: null,
  pickedLocation: null,
  termsAccepted: false,
  filterOpen: false,
  filters: { wheelchair:null, restrooms:null, dogs:null, indoor:null, outdoor:null, mountains:null },
};

// ===================================================================
// DATA
// ===================================================================
async function loadLocations() {
  try {
    const r = await fetch('/api/locations');
    if (!r.ok) throw new Error(`API ${r.status}`);
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    LOCATIONS = data.locations || [];
  } catch(e) {
    console.error('Failed to load locations:', e);
    LOCATIONS = [];
  }
  return LOCATIONS;
}

// ===================================================================
// HELPERS
// ===================================================================
const $ = sel => document.querySelector(sel);

function updateProgress() { $('#step-num').textContent = flow.step; }

function haversineMiles(a, b) {
  const R = 3959, toRad = d => d * Math.PI / 180;
  const dLat = toRad(b.lat - a.lat), dLon = toRad(b.lng - a.lng);
  const x = Math.sin(dLat/2)**2 + Math.sin(dLon/2)**2 * Math.cos(toRad(a.lat)) * Math.cos(toRad(b.lat));
  return 2 * R * Math.asin(Math.sqrt(x));
}

function estimateDriveMins(a, b) {
  return (haversineMiles(a, b) * 1.4) / 50 * 60;
}

async function geocodeCity(city, stateCode) {
  const stateName = STATE_NAMES[stateCode] || 'Utah';
  const url = 'https://nominatim.openstreetmap.org/search?' + new URLSearchParams({
    q: `${city}, ${stateName}, USA`, format:'json', limit:1
  });
  try {
    const r = await fetch(url, { headers:{ 'Accept-Language':'en' } });
    const data = await r.json();
    if (data.length) return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
  } catch(e) { console.error(e); }
  return null;
}

function getPhotoForSeason(loc, seasonId) {
  if (!loc.photos || !loc.photos.length) return null;
  const s = SEASONS.find(s => s.id === seasonId);
  if (s) {
    for (const m of s.months) {
      const p = loc.photos.find(p => p.months && p.months.includes(m));
      if (p) return p;
    }
  }
  return loc.photos[0];
}

function isActiveInSeason(loc, seasonId) {
  const s = SEASONS.find(s => s.id === seasonId);
  if (!s) return true;
  // Check seasons field first (from "Seasons Available" in Airtable)
  if (loc.seasons && loc.seasons.length > 0) {
    return loc.seasons.some(sv => sv.toLowerCase().trim() === seasonId);
  }
  // Fall back to defaultMonths
  if (loc.defaultMonths && loc.defaultMonths.length > 0) {
    return loc.defaultMonths.some(m => s.months.includes(m));
  }
  return true; // no restriction → always show
}

function getAccessClass(level) {
  if (!level) return '';
  const l = level.toLowerCase();
  if (l === 'easy') return 'easy';
  if (l === 'moderate') return 'moderate';
  if (l.includes('hard') || l.includes('difficult')) return 'hard';
  return '';
}

function getFeeBadges(loc) {
  const badges = [];
  const zone = (loc.travelZone || '').trim();
  if (zone && zone !== 'Zone 1') {
    badges.push({ label: zone === 'Zone 5' ? 'Travel fee (invoiced)' : 'Travel fee', cls:'has-fee' });
  }
  const clean = v => String(v || '').replace(/[$,\s]/g,'');
  if (clean(loc.photoPassAmount)   && clean(loc.photoPassAmount)   !== '0') badges.push({ label:'Photo pass',   cls:'has-fee' });
  if (clean(loc.studioFeeAmount)   && clean(loc.studioFeeAmount)   !== '0'
    && (loc.studioFeeAmount||'').toLowerCase() !== 'none')                   badges.push({ label:'Studio fee',   cls:'has-fee' });
  if (clean(loc.vehiclePassAmount) && clean(loc.vehiclePassAmount) !== '0') badges.push({ label:'Vehicle pass',  cls:'has-fee' });
  if (!badges.length) badges.push({ label:'No fees', cls:'none' });
  return badges;
}

function applyFilters(locs) {
  const f = flow.filters;
  return locs.filter(loc => {
    const allTags = [
      ...(loc.amenityTags || []),
      ...(loc.tags || [])
    ].map(t => t.toLowerCase().trim());
    const type = (loc.type || '').toLowerCase();

    if (f.wheelchair === 'yes' && !allTags.some(t => t.includes('wheelchair'))) return false;
    if (f.wheelchair === 'no'  &&  allTags.some(t => t.includes('wheelchair'))) return false;
    if (f.restrooms  === 'yes' && !allTags.some(t => t.includes('restroom')))   return false;
    if (f.restrooms  === 'no'  &&  allTags.some(t => t.includes('restroom')))   return false;
    if (f.dogs === 'yes' &&  allTags.some(t => t.includes('dogs not allowed'))) return false;
    if (f.dogs === 'no'  && !allTags.some(t => t.includes('dogs not allowed'))) return false;
    if (f.indoor  === 'yes' && type !== 'indoor')  return false;
    if (f.indoor  === 'no'  && type === 'indoor')  return false;
    if (f.outdoor === 'yes' && type !== 'outdoor') return false;
    if (f.outdoor === 'no'  && type === 'outdoor') return false;
    if (f.mountains === 'yes' && !allTags.some(t => t.includes('mountain'))) return false;
    if (f.mountains === 'no'  &&  allTags.some(t => t.includes('mountain'))) return false;
    return true;
  });
}

function activeFilterCount() {
  return Object.values(flow.filters).filter(v => v !== null).length;
}

// ===================================================================
// STEP 1 — State + Season
// ===================================================================
function renderStep1() {
  flow.step = 1; updateProgress();
  $('#stage').className = 'stage';
  $('#stage').innerHTML = `
    <div class="step">
      <h1>Pick Your Location</h1>
      <p>Welcome! Now that you're booked, let's find the perfect spot for your shoot. This will take about 5 minutes.</p>

      <p class="label" style="margin-top:12px;">Where is your shoot?</p>
      <div class="options" id="state-opts" style="grid-template-columns:1fr 1fr;">
        <button class="option ${flow.state==='UT'?'active':''}" data-state="UT">
          <div class="o-label">Utah</div>
        </button>
        <button class="option ${flow.state==='CA'?'active':''}" data-state="CA">
          <div class="o-label">California</div>
        </button>
      </div>

      <p class="label" style="margin-top:28px;">When is your shoot?</p>
      <div class="options" id="season-opts" style="grid-template-columns:repeat(4,1fr);">
        ${SEASONS.map(s => `
          <button class="option ${flow.season===s.id?'active':''}" data-season="${s.id}">
            <div class="o-label">${s.label}</div>
            <div class="o-sub">${s.sub}</div>
          </button>`).join('')}
      </div>

      <div class="btn-row">
        <span></span>
        <button class="btn" id="next-1" ${flow.state && flow.season ? '' : 'disabled'}>Continue →</button>
      </div>
    </div>`;

  document.querySelectorAll('#state-opts .option').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#state-opts .option').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      flow.state = btn.dataset.state;
      $('#next-1').disabled = !(flow.state && flow.season);
    });
  });
  document.querySelectorAll('#season-opts .option').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#season-opts .option').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      flow.season = btn.dataset.season;
      $('#next-1').disabled = !(flow.state && flow.season);
    });
  });
  $('#next-1').addEventListener('click', () => renderStep2());
}

// ===================================================================
// STEP 2 — City
// ===================================================================
function renderStep2() {
  flow.step = 2; updateProgress();
  $('#stage').className = 'stage';
  $('#stage').innerHTML = `
    <div class="step">
      <h1>Where in ${STATE_NAMES[flow.state] || 'your state'}?</h1>
      <p>Type the city or zip code closest to you. We'll show you spots within your driving range.</p>
      <p class="label">Your city or zip</p>
      <input class="input" id="city-input" placeholder="e.g. Provo, 84601, or Park City" autofocus value="${flow.city||''}" />
      <p class="small-note" id="city-status"></p>
      <div class="btn-row">
        <button class="btn btn-secondary" id="back-2">← Back</button>
        <button class="btn" id="next-2" ${flow.city?'':'disabled'}>Continue →</button>
      </div>
    </div>`;

  const input = $('#city-input'), next = $('#next-2');
  input.addEventListener('input', () => {
    next.disabled = input.value.trim().length < 2;
    flow.cityCoords = null;
    $('#city-status').textContent = '';
  });
  input.addEventListener('keydown', e => { if (e.key === 'Enter' && !next.disabled) next.click(); });
  $('#back-2').addEventListener('click', () => renderStep1());
  next.addEventListener('click', async () => {
    flow.city = input.value.trim();
    next.disabled = true; next.textContent = 'Locating…';
    $('#city-status').textContent = 'Finding your city…';
    const coords = await geocodeCity(flow.city, flow.state);
    if (!coords) {
      $('#city-status').textContent = "Couldn't find that. Try a zip code or nearby town.";
      next.disabled = false; next.textContent = 'Continue →'; return;
    }
    flow.cityCoords = coords;
    renderStep3();
  });
}

// ===================================================================
// STEP 3 — Drive time
// ===================================================================
function renderStep3() {
  flow.step = 3; updateProgress();
  $('#stage').className = 'stage';
  $('#stage').innerHTML = `
    <div class="step">
      <h1>How far are you willing to drive?</h1>
      <p>We'll only show locations within this drive time of <strong>${flow.city}</strong>.</p>
      <div class="options" id="drive-opts">
        ${DRIVE_OPTS.map(o => `
          <button class="option ${flow.driveMins===o.mins?'active':''}" data-mins="${o.mins}">
            <div class="o-label">${o.label}</div>
            <div class="o-sub">${o.sub}</div>
          </button>`).join('')}
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary" id="back-3">← Back</button>
        <button class="btn" id="next-3" ${flow.driveMins?'':'disabled'}>Show me spots →</button>
      </div>
    </div>`;

  document.querySelectorAll('#drive-opts .option').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#drive-opts .option').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      flow.driveMins = parseInt(btn.dataset.mins, 10);
      $('#next-3').disabled = false;
    });
  });
  $('#back-3').addEventListener('click', () => renderStep2());
  $('#next-3').addEventListener('click', () => renderStep4());
}

// ===================================================================
// STEP 4 — Location grid
// ===================================================================
async function renderStep4() {
  flow.step = 4; updateProgress();
  $('#stage').className = 'stage';

  if (!LOCATIONS || LOCATIONS.length === 0) {
    $('#stage').innerHTML = `<div class="step" style="text-align:center;"><h2>Loading locations…</h2><p>Just a moment.</p></div>`;
    await dataPromise;
    if (!LOCATIONS || LOCATIONS.length === 0) {
      $('#stage').innerHTML = `<div class="step" style="text-align:center;"><h2>Couldn't load locations.</h2><p>Please refresh the page.</p></div>`;
      return;
    }
  }

  $('#stage').className = 'stage stage--wide';
  const seasonLabel = SEASONS.find(s => s.id === flow.season)?.label || '';

  $('#stage').innerHTML = `
    <div class="step">
      <h1 style="text-align:center;">Pick your spot</h1>
      <p style="text-align:center; max-width:480px; margin:0 auto 24px;">
        ${seasonLabel} locations within ${flow.driveMins} min of ${flow.city}
        <span id="change-city" style="color:var(--sage-dk);cursor:pointer;font-size:0.82rem;margin-left:8px;text-decoration:underline;">change</span>
      </p>

      <div class="grid-controls">
        <div class="grid-count" id="grid-count"></div>
        <div class="grid-right">
          <select class="drive-select" id="drive-quick">
            ${DRIVE_OPTS.map(o => `<option value="${o.mins}" ${flow.driveMins===o.mins?'selected':''}>${o.label}</option>`).join('')}
          </select>
          <button class="filter-btn ${flow.filterOpen?'open':''}" id="filter-toggle">
            ⚙ Filters
            <span class="filter-count-badge ${activeFilterCount()>0?'visible':''}" id="filter-badge">${activeFilterCount()}</span>
          </button>
        </div>
      </div>

      <div class="filter-panel ${flow.filterOpen?'open':''}" id="filter-panel">
        <div class="filter-grid" id="filter-grid">
          ${buildFilterGrid()}
        </div>
        <div class="filter-footer">
          <button class="btn btn-secondary btn-small" id="clear-filters">Clear all filters</button>
        </div>
      </div>

      <div class="loc-grid" id="loc-grid"></div>

      <div class="pick-bar">
        <div class="pick-bar-inner">
          <div class="pick-bar-info" id="pick-info">Select a location above to continue</div>
          <div style="display:flex;gap:10px;">
            <button class="btn btn-secondary" id="back-4">← Back</button>
            <button class="btn" id="next-4" disabled>Pick this spot →</button>
          </div>
        </div>
      </div>
    </div>`;

  refreshGrid();
  wireFilterToggles();

  $('#change-city').addEventListener('click', () => renderStep2());
  $('#drive-quick').addEventListener('change', e => {
    flow.driveMins = parseInt(e.target.value, 10);
    flow.pickedLocation = null;
    resetPickBar();
    refreshGrid();
  });
  $('#filter-toggle').addEventListener('click', () => {
    flow.filterOpen = !flow.filterOpen;
    $('#filter-panel').classList.toggle('open', flow.filterOpen);
    $('#filter-toggle').classList.toggle('open', flow.filterOpen);
  });
  $('#clear-filters').addEventListener('click', () => {
    flow.filters = { wheelchair:null, restrooms:null, dogs:null, indoor:null, outdoor:null, mountains:null };
    $('#filter-grid').innerHTML = buildFilterGrid();
    wireFilterToggles();
    updateFilterBadge();
    flow.pickedLocation = null;
    resetPickBar();
    refreshGrid();
  });
  $('#back-4').addEventListener('click', () => renderStep3());
  $('#next-4').addEventListener('click', () => { if (flow.pickedLocation) renderStep5(); });
}

function buildFilterGrid() {
  return FILTER_DEFS.map(fd => `
    <div>
      <div class="filter-item-label">${fd.label}</div>
      <div class="toggle-group">
        <button class="toggle-btn ${flow.filters[fd.key]==='yes'?'yes':''}" data-key="${fd.key}" data-val="yes">Yes</button>
        <button class="toggle-btn ${flow.filters[fd.key]==='no'?'no':''}"  data-key="${fd.key}" data-val="no">No</button>
      </div>
    </div>`).join('');
}

function wireFilterToggles() {
  document.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const { key, val } = btn.dataset;
      if (flow.filters[key] === val) {
        flow.filters[key] = null;
        btn.closest('.toggle-group').querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('yes','no'));
      } else {
        flow.filters[key] = val;
        btn.closest('.toggle-group').querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('yes','no'));
        btn.classList.add(val);
      }
      updateFilterBadge();
      flow.pickedLocation = null;
      resetPickBar();
      refreshGrid();
    });
  });
}

function updateFilterBadge() {
  const n = activeFilterCount();
  const badge = $('#filter-badge');
  if (badge) { badge.textContent = n; badge.classList.toggle('visible', n > 0); }
  const btn = $('#filter-toggle');
  if (btn) btn.classList.toggle('open', flow.filterOpen || n > 0);
}

function resetPickBar() {
  const btn = $('#next-4'); if (btn) btn.disabled = true;
  const info = $('#pick-info'); if (info) info.textContent = 'Select a location above to continue';
  const info2 = $('#pick-info'); if (info2) info2.innerHTML = 'Select a location above to continue';
}

function refreshGrid() {
  const withDrive = LOCATIONS
    .map(loc => ({ ...loc, driveMins: estimateDriveMins(flow.cityCoords, loc), miles: haversineMiles(flow.cityCoords, loc) }))
    .filter(loc => isActiveInSeason(loc, flow.season))
    .filter(loc => loc.driveMins <= flow.driveMins)
    .sort((a, b) => a.driveMins - b.driveMins);

  const filtered = applyFilters(withDrive);
  const countEl = $('#grid-count');
  if (countEl) countEl.textContent = `${filtered.length} ${filtered.length===1?'spot':'spots'} found`;

  const grid = $('#loc-grid');
  if (!grid) return;

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="no-results"><h3>No spots found</h3><p>Try a longer drive time, different filters, or a different season.</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(loc => buildCard(loc)).join('');
  document.querySelectorAll('.loc-card').forEach(card => {
    card.addEventListener('click', () => selectLocation(card.dataset.id, filtered));
  });
}

function buildCard(loc) {
  const photo = getPhotoForSeason(loc, flow.season);
  const photoHTML = photo
    ? `<img class="loc-photo" src="${photo.url}" alt="${(photo.caption||loc.name).replace(/"/g,'&quot;')}" loading="lazy" />`
    : `<div class="loc-photo-placeholder">${loc.name}</div>`;

  const lvl = getAccessClass(loc.accessibilityLevel);
  const accessBadgeHTML = loc.accessibilityLevel
    ? `<span class="access-badge ${lvl}"><span class="access-dot"></span>${loc.accessibilityLevel}</span>`
    : '';
  const accessTextHTML = loc.accessibility
    ? `<span class="access-text">${loc.accessibility}</span>`
    : '';
  const accessHTML = (accessBadgeHTML || accessTextHTML)
    ? `<div class="loc-access">${accessBadgeHTML}${accessTextHTML}</div>`
    : '';

  const sceneTags = (loc.tags || []).filter(Boolean).map(t => `<span class="tag scene">${t}</span>`).join('');
  const amenityTags = (loc.amenityTags || []).filter(Boolean).map(t => `<span class="tag amenity">${t}</span>`).join('');
  const tagsHTML = (sceneTags || amenityTags) ? `<div class="loc-tags">${sceneTags}${amenityTags}</div>` : '';

  const fees = getFeeBadges(loc);
  const feesHTML = `<div class="loc-fees">
    <span class="fees-label">Fees:</span>
    ${fees.map(f => `<span class="fee-badge ${f.cls}">${f.label}</span>`).join('')}
  </div>`;

  const desc = (loc.description || loc.notes || '').trim();
  const descHTML = desc ? `<div class="loc-desc">${desc}</div>` : '';
  const timeHTML = loc.bestTimeOfDay ? `<div class="loc-time">🕐 Best time: <span class="loc-time-val">${loc.bestTimeOfDay}</span></div>` : '';

  const isSelected = flow.pickedLocation && flow.pickedLocation.id === loc.id;

  return `
    <div class="loc-card ${isSelected?'selected':''}" data-id="${loc.id}">
      ${photoHTML}
      <div class="loc-body">
        <div class="loc-name">${loc.name}</div>
        <div class="loc-dist">~${Math.round(loc.driveMins)} min · ${Math.round(loc.miles)} mi from ${flow.city}</div>
        ${descHTML}
        ${timeHTML}
        ${accessHTML}
        ${tagsHTML}
        ${feesHTML}
      </div>
    </div>`;
}

function selectLocation(id, locs) {
  const loc = locs.find(l => l.id === id);
  if (!loc) return;
  flow.pickedLocation = loc;
  document.querySelectorAll('.loc-card').forEach(c => c.classList.toggle('selected', c.dataset.id === id));
  const btn = $('#next-4'); if (btn) btn.disabled = false;
  const info = $('#pick-info'); if (info) info.innerHTML = `Selected: <strong>${loc.name}</strong>`;
}

// ===================================================================
// STEP 5 — Confirmation + Payment
// ===================================================================
function renderStep5() {
  flow.step = 5; updateProgress();
  $('#stage').className = 'stage';
  const loc = flow.pickedLocation;
  const seasonLabel = SEASONS.find(s => s.id === flow.season)?.label || '';

  $('#stage').innerHTML = `
    <div class="step">
      <div class="card">
        <h2>Good choice! ✨</h2>
        <p>Your booking is updated with <strong>${loc.name}</strong>.</p>
        <p>
          <span class="pill">${loc.type || 'outdoor'}</span>
          <span class="pill">${seasonLabel}</span>
          <span class="pill">~${Math.round(loc.driveMins)} min from ${flow.city}</span>
        </p>
        ${loc.accessibility ? `<p style="font-size:0.9rem;color:var(--sage-dk);">♿ ${loc.accessibility}</p>` : ''}
        ${(loc.description||loc.notes) ? `<p style="font-style:italic;font-size:0.9rem;">${loc.description||loc.notes}</p>` : ''}
        <button class="change-loc-btn" id="change-loc">← Change my location</button>
      </div>

      <div class="card" style="margin-top:20px;">
        <h2>Last step — secure your booking</h2>
        <p>Pay your <strong>$50 deposit</strong> to lock in your spot. The remainder is due when you receive your photos.</p>
        <label class="check-row">
          <input type="checkbox" id="terms" />
          <span>I agree to the <a href="#" onclick="alert('Contract preview coming soon'); return false;">terms &amp; conditions</a> and photoshoot contract.</span>
        </label>
        <div class="pay-options">
          <button class="btn stripe-btn" id="pay-stripe" disabled>Pay $50 with Stripe</button>
        </div>
        <p class="deposit-note">Once your deposit is paid, you'll receive a confirmation text with the Google Maps link, parking info, and an outfit guide.</p>
      </div>
    </div>`;

  $('#change-loc').addEventListener('click', () => renderStep4());
  $('#terms').addEventListener('change', e => {
    flow.termsAccepted = e.target.checked;
    $('#pay-stripe').disabled = !flow.termsAccepted;
  });
  $('#pay-stripe').addEventListener('click', () => {
    alert('This will redirect to your Stripe Payment Link.');
  });
}

// ===================================================================
// INIT
// ===================================================================
renderStep1();
</script>
</body>
</html>
