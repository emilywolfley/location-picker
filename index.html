<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pick Your Location · Emily Sharon Photography</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --cream:    #f7f3ec;
    --warm:     #efe6d6;
    --sage:     #8a9b80;
    --sage-dk:  #6b7c63;
    --rose:     #c89898;
    --ink:      #2b2622;
    --ink-soft: #5a504a;
    --gold:     #b89968;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; }
  h1, h2, h3 { font-family: 'Cormorant Garamond', serif; font-weight: 500; letter-spacing: -0.5px; }
  h1 { font-size: clamp(2rem, 5vw, 3.4rem); margin: 0 0 0.4em; }
  h2 { font-size: clamp(1.4rem, 3vw, 2rem); margin: 0 0 0.4em; }
  p  { line-height: 1.6; color: var(--ink-soft); margin: 0 0 1.2em; }

  .stage { max-width: 720px; margin: 0 auto; padding: 64px 24px 100px; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }

  .brand { position: fixed; top: 24px; left: 24px; font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; letter-spacing: 4px; text-transform: uppercase; color: var(--ink-soft); z-index: 200; }
  .progress { position: fixed; top: 24px; right: 24px; font-size: 0.78rem; color: var(--ink-soft); letter-spacing: 1px; z-index: 200; }
  .progress span { color: var(--ink); font-weight: 500; }

  .step { animation: fadeIn 0.45s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

  .card { background: white; border-radius: 18px; padding: 40px; box-shadow: 0 8px 30px rgba(43,38,34,0.06); }

  /* Option buttons */
  .options { display: grid; gap: 10px; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
  .option { background: var(--cream); border: 1px solid #e3dccf; border-radius: 12px; padding: 18px 12px; font-family: inherit; font-size: 1rem; color: var(--ink); cursor: pointer; transition: all 0.2s; text-align: center; }
  .option .o-label { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; }
  .option .o-sub   { font-size: 0.74rem; color: var(--ink-soft); margin-top: 4px; letter-spacing: 0.5px; }
  .option:hover    { border-color: var(--sage); transform: translateY(-1px); }
  .option.active   { background: var(--sage); color: white; border-color: var(--sage); }
  .option.active .o-sub { color: rgba(255,255,255,0.85); }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px; background: var(--ink); color: var(--cream); border: none; border-radius: 999px; font-family: inherit; font-size: 0.95rem; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; text-decoration: none; }
  .btn:hover:not(:disabled) { background: var(--sage); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary { background: transparent; color: var(--ink-soft); border: 1px solid #e3dccf; }
  .btn-secondary:hover:not(:disabled) { color: var(--ink); border-color: var(--ink-soft); background: transparent; }
  .btn-small { padding: 10px 20px; font-size: 0.78rem; }
  .btn-row { display: flex; justify-content: space-between; gap: 12px; margin-top: 28px; }

  .input { width: 100%; padding: 16px 18px; font-size: 1.05rem; font-family: inherit; border: 1px solid #e3dccf; border-radius: 12px; background: var(--cream); color: var(--ink); outline: none; transition: border-color 0.2s; }
  .input:focus { border-color: var(--sage); }
  .small-note { font-size: 0.78rem; color: var(--ink-soft); margin-top: 16px; }
  .label { display: block; font-size: 0.78rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 8px; }
  .pill { display: inline-block; padding: 4px 12px; background: var(--warm); color: var(--ink-soft); border-radius: 999px; font-size: 0.78rem; letter-spacing: 0.5px; margin-right: 6px; }

  /* ══════════════════════════════════════════
     STEP 4 — MAP + SIDEBAR LAYOUT
  ══════════════════════════════════════════ */
  .map-view {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    background: var(--cream);
    z-index: 10;
  }

  /* Top controls bar */
  .map-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 20px;
    background: white;
    border-bottom: 1px solid #e3dccf;
    flex-wrap: wrap;
    flex-shrink: 0;
    z-index: 150;
  }
  .map-controls-left {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-right: 12px;
  }
  .map-ctx {
    font-size: 0.82rem;
    color: var(--ink-soft);
  }
  .map-ctx strong { color: var(--ink); }
  .map-ctx-change {
    color: var(--sage-dk);
    cursor: pointer;
    text-decoration: underline;
    font-size: 0.78rem;
    margin-left: 6px;
  }
  .map-controls-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .grid-count { font-size: 0.82rem; color: var(--ink-soft); white-space: nowrap; }

  .drive-select {
    padding: 8px 14px;
    font-size: 0.85rem;
    font-family: inherit;
    border: 1px solid #e3dccf;
    border-radius: 999px;
    background: var(--cream);
    color: var(--ink);
    outline: none;
    cursor: pointer;
  }
  .drive-select:focus { border-color: var(--sage); }

  /* Filter dropdown */
  .filter-wrap { position: relative; }
  .filter-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 16px;
    background: var(--cream);
    border: 1px solid #e3dccf;
    border-radius: 999px;
    font-size: 0.85rem;
    color: var(--ink);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover, .filter-btn.open { border-color: var(--sage); background: white; }
  .filter-active-badge {
    background: var(--sage);
    color: white;
    border-radius: 999px;
    width: 17px; height: 17px;
    font-size: 0.68rem;
    font-weight: 700;
    display: none;
    align-items: center; justify-content: center;
  }
  .filter-active-badge.show { display: inline-flex; }

  .filter-panel {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    background: white;
    border: 1px solid #e3dccf;
    border-radius: 16px;
    padding: 8px 0 12px;
    min-width: 240px;
    box-shadow: 0 12px 40px rgba(43,38,34,0.12);
    z-index: 300;
    animation: fadeIn 0.15s ease;
  }
  .filter-panel.open { display: block; }

  .filter-panel-title {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--ink-soft);
    padding: 10px 18px 6px;
    border-bottom: 1px solid #f0ebe2;
    margin-bottom: 4px;
  }

  .filter-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 18px;
    gap: 16px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .filter-row:hover { background: var(--cream); }
  .filter-row-label { font-size: 0.88rem; color: var(--ink); user-select: none; }

  /* Toggle switch */
  .toggle {
    width: 38px; height: 21px;
    background: #d1ccc5;
    border-radius: 999px;
    position: relative;
    flex-shrink: 0;
    transition: background 0.2s;
    cursor: pointer;
  }
  .toggle.on { background: var(--sage); }
  .toggle-knob {
    position: absolute;
    width: 17px; height: 17px;
    background: white;
    border-radius: 50%;
    top: 2px; left: 2px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    transition: transform 0.2s;
  }
  .toggle.on .toggle-knob { transform: translateX(17px); }

  .filter-clear-row {
    padding: 8px 18px 0;
    border-top: 1px solid #f0ebe2;
    margin-top: 4px;
    text-align: right;
  }
  .filter-clear-btn {
    background: none; border: none;
    font-family: inherit;
    font-size: 0.78rem;
    color: var(--rose);
    cursor: pointer;
    padding: 4px 0;
  }
  .filter-clear-btn:hover { text-decoration: underline; }

  /* Map + sidebar body */
  .map-body {
    flex: 1;
    display: flex;
    overflow: hidden;
    min-height: 0;
  }

  #leaflet-map {
    flex: 1;
    min-width: 0;
    z-index: 1;
  }

  /* Leaflet custom pins */
  .map-pin {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 2.5px solid white;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    cursor: pointer;
    transition: all 0.15s;
  }
  .map-pin.selected {
    width: 20px; height: 20px;
    margin: -3px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.4);
  }

  /* Cards sidebar */
  .loc-sidebar {
    width: 380px;
    flex-shrink: 0;
    overflow-y: auto;
    padding: 12px;
    background: var(--cream);
    border-left: 1px solid #e3dccf;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  @media (max-width: 800px) {
    .map-body { flex-direction: column; }
    #leaflet-map { flex: none; height: 260px; width: 100%; }
    .loc-sidebar { width: 100%; border-left: none; border-top: 1px solid #e3dccf; }
  }

  /* Location cards */
  .loc-card {
    background: white; border-radius: 14px; overflow: hidden;
    box-shadow: 0 2px 12px rgba(43,38,34,0.07);
    cursor: pointer; transition: all 0.2s;
    border: 2px solid transparent;
    flex-shrink: 0;
  }
  .loc-card:hover { box-shadow: 0 6px 20px rgba(43,38,34,0.12); transform: translateY(-1px); }
  .loc-card.selected { border-color: var(--sage); box-shadow: 0 0 0 4px rgba(138,155,128,0.15); }

  .loc-photo { width: 100%; height: 170px; object-fit: cover; display: block; }
  .loc-photo-placeholder {
    width: 100%; height: 170px;
    background: linear-gradient(135deg, var(--warm) 0%, var(--sage) 100%);
    display: flex; align-items: center; justify-content: center;
    color: white; font-family: 'Cormorant Garamond', serif;
    font-size: 1rem; text-align: center; padding: 0 14px;
  }

  .loc-body { padding: 14px 16px 16px; display: flex; flex-direction: column; gap: 8px; }
  .loc-name { font-family: 'Cormorant Garamond', serif; font-size: 1.25rem; color: var(--ink); line-height: 1.2; }
  .loc-dist { font-size: 0.78rem; color: var(--ink-soft); }
  .loc-desc { font-size: 0.82rem; color: var(--ink-soft); line-height: 1.5; }
  .loc-time { font-size: 0.78rem; color: var(--ink-soft); }
  .loc-time-val { color: var(--gold); font-weight: 500; }

  /* Accessibility badge */
  .loc-access { display: flex; align-items: flex-start; gap: 7px; flex-wrap: wrap; }
  .access-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 999px; font-size: 0.72rem; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
  .access-badge.easy     { background: #e8f5e9; color: #2e7d32; }
  .access-badge.moderate { background: #fff8e1; color: #e65100; }
  .access-badge.hard     { background: #fce4ec; color: #c62828; }
  .access-dot { width: 6px; height: 6px; border-radius: 50%; }
  .easy     .access-dot { background: #4caf50; }
  .moderate .access-dot { background: #ff9800; }
  .hard     .access-dot { background: #f44336; }
  .access-text { font-size: 0.76rem; color: var(--ink-soft); line-height: 1.4; font-style: italic; }

  /* Tags */
  .loc-tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .tag { padding: 2px 9px; border-radius: 999px; font-size: 0.7rem; letter-spacing: 0.3px; white-space: nowrap; }
  .tag.scene   { background: var(--warm); color: var(--ink-soft); }
  .tag.amenity { background: #e3f2fd; color: #1565c0; }

  /* Fees */
  .loc-fees { padding-top: 8px; border-top: 1px solid #f0ebe2; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; font-size: 0.76rem; }
  .fees-label { font-weight: 500; color: var(--ink); }
  .fee-badge { padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 500; }
  .fee-badge.none    { background: #e8f5e9; color: #2e7d32; }
  .fee-badge.has-fee { background: #fff3e0; color: #e65100; }

  .no-results { text-align: center; padding: 40px 20px; }
  .no-results h3 { font-size: 1.3rem; color: var(--ink); margin-bottom: 8px; }

  /* Bottom pick bar */
  .pick-bar {
    position: relative;
    background: rgba(247,243,236,0.97);
    backdrop-filter: blur(8px);
    border-top: 1px solid #e3dccf;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    z-index: 150;
  }
  .pick-bar-info { font-size: 0.88rem; color: var(--ink-soft); }
  .pick-bar-info strong { color: var(--ink); }
  .pick-bar-right { display: flex; gap: 10px; }

  /* Confirmation */
  .check-row { display: flex; align-items: flex-start; gap: 10px; padding: 14px; background: var(--cream); border-radius: 10px; margin: 24px 0; cursor: pointer; }
  .check-row input { margin-top: 3px; }
  .check-row span { font-size: 0.92rem; line-height: 1.5; }
  .pay-options { display: flex; gap: 12px; margin-top: 20px; }
  .pay-options .btn { flex: 1; justify-content: center; }
  .stripe-btn { background: #635bff !important; }
  .stripe-btn:hover:not(:disabled) { background: #5048e5 !important; }
  .deposit-note { font-size: 0.85rem; color: var(--ink-soft); font-style: italic; margin-top: 10px; }
  .change-loc-btn { display: inline-flex; align-items: center; gap: 6px; margin-top: 16px; padding: 10px 20px; background: transparent; color: var(--sage-dk); border: 1px solid var(--sage); border-radius: 999px; font-family: inherit; font-size: 0.85rem; cursor: pointer; transition: all 0.15s; }
  .change-loc-btn:hover { background: var(--sage); color: white; }
</style>
</head>
<body>

<div class="brand">EMILY SHARON</div>
<div class="progress">Step <span id="step-num">1</span> of 6</div>
<div id="stage"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ===================================================================
// CONSTANTS
// ===================================================================
const SEASONS = [
  { id:'winter', label:'Winter', months:[11,12,1,2],  sub:'November – February' },
  { id:'spring', label:'Spring', months:[3,4,5],       sub:'March – May'         },
  { id:'summer', label:'Summer', months:[6,7,8],       sub:'June – August'       },
  { id:'fall',   label:'Fall',   months:[9,10],         sub:'September – October' },
];

const DRIVE_OPTS = [
  { mins:15, label:'15 min', sub:'close to home'  },
  { mins:30, label:'30 min', sub:'a quick trip'   },
  { mins:45, label:'45 min', sub:'happy to drive' },
  { mins:60, label:'1 hour', sub:'adventure ready'},
  { mins:90, label:'1.5 hrs',sub:'go anywhere'    },
];

const STATE_NAMES = { UT:'Utah', CA:'California' };

const FILTER_DEFS = [
  { key:'wheelchair', label:'Wheelchair Friendly', check: (loc, tags) => tags.some(t => t.includes('wheelchair')) },
  { key:'restrooms',  label:'Restrooms',           check: (loc, tags) => tags.some(t => t.includes('restroom')) },
  { key:'dogs',       label:'Dogs Allowed',         check: (loc, tags) => !tags.some(t => t.includes('dogs not allowed')) },
  { key:'outdoor',    label:'Outdoor',              check: (loc, tags) => (loc.type||'').toLowerCase() === 'outdoor' },
  { key:'indoor',     label:'Indoor',               check: (loc, tags) => (loc.type||'').toLowerCase() === 'indoor' },
  { key:'mountains',  label:'Mountains',            check: (loc, tags) => tags.some(t => t.includes('mountain')) },
  { key:'water',      label:'Water',                check: (loc, tags) => tags.some(t => t.includes('water')) },
  { key:'trees',      label:'Trees',                check: (loc, tags) => tags.some(t => t.includes('tree')) },
  { key:'urban',      label:'Urban',                check: (loc, tags) => tags.some(t => t.includes('urban')) },
  { key:'field',      label:'Field',                check: (loc, tags) => tags.some(t => t.includes('field')) },
];

// ===================================================================
// STATE
// ===================================================================
let LOCATIONS = [];
const dataPromise = loadLocations();

const emptyFilters = () => Object.fromEntries(FILTER_DEFS.map(f => [f.key, false]));

const flow = {
  step: 1,
  state:  null,
  season: null,
  city:   null,
  cityCoords: null,
  driveMins: null,
  pickedLocation: null,
  termsAccepted: false,
  filterOpen: false,
  filters: emptyFilters(),
};

// Map state
let leafletMap   = null;
let mapMarkers   = {};
let currentFiltered = [];

// ===================================================================
// DATA
// ===================================================================
async function loadLocations() {
  try {
    const r = await fetch('/api/locations');
    if (!r.ok) throw new Error(`API ${r.status}`);
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    LOCATIONS = data.locations || [];
  } catch(e) {
    console.error('Failed to load locations:', e);
    LOCATIONS = [];
  }
  return LOCATIONS;
}

// ===================================================================
// HELPERS
// ===================================================================
const $ = sel => document.querySelector(sel);
function updateProgress() { $('#step-num').textContent = flow.step; }

function haversineMiles(a, b) {
  const R = 3959, toRad = d => d * Math.PI / 180;
  const dLat = toRad(b.lat - a.lat), dLon = toRad(b.lng - a.lng);
  const x = Math.sin(dLat/2)**2 + Math.sin(dLon/2)**2 * Math.cos(toRad(a.lat)) * Math.cos(toRad(b.lat));
  return 2 * R * Math.asin(Math.sqrt(x));
}

function estimateDriveMins(a, b) {
  return (haversineMiles(a, b) * 1.4) / 50 * 60;
}

async function geocodeCity(city, stateCode) {
  const stateName = STATE_NAMES[stateCode] || 'Utah';
  const url = 'https://nominatim.openstreetmap.org/search?' + new URLSearchParams({
    q: `${city}, ${stateName}, USA`, format:'json', limit:1
  });
  try {
    const r = await fetch(url, { headers:{ 'Accept-Language':'en' } });
    const data = await r.json();
    if (data.length) return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
  } catch(e) { console.error(e); }
  return null;
}

function getPhotoForSeason(loc, seasonId) {
  if (!loc.photos || !loc.photos.length) return null;
  const s = SEASONS.find(s => s.id === seasonId);
  if (s) {
    for (const m of s.months) {
      const p = loc.photos.find(p => p.months && p.months.includes(m));
      if (p) return p;
    }
  }
  return loc.photos[0];
}

function isActiveInSeason(loc, seasonId) {
  const s = SEASONS.find(s => s.id === seasonId);
  if (!s) return true;
  if (loc.seasons && loc.seasons.length > 0) {
    return loc.seasons.some(sv => sv.toLowerCase().trim() === seasonId);
  }
  if (loc.defaultMonths && loc.defaultMonths.length > 0) {
    return loc.defaultMonths.some(m => s.months.includes(m));
  }
  return true;
}

function getAccessClass(level) {
  if (!level) return '';
  const l = level.toLowerCase();
  if (l === 'easy') return 'easy';
  if (l === 'moderate') return 'moderate';
  if (l.includes('hard') || l.includes('difficult')) return 'hard';
  return '';
}

function getFeeBadges(loc) {
  const badges = [];
  const zone = (loc.travelZone || '').trim();
  if (zone && zone !== 'Zone 1') badges.push({ label:'Travel fee', cls:'has-fee' });
  const clean = v => String(v||'').replace(/[$,\s]/g,'');
  if (clean(loc.photoPassAmount)   && clean(loc.photoPassAmount)   !== '0') badges.push({ label:'Photo pass',  cls:'has-fee' });
  if (clean(loc.studioFeeAmount)   && clean(loc.studioFeeAmount)   !== '0'
    && (loc.studioFeeAmount||'').toLowerCase() !== 'none')                   badges.push({ label:'Studio fee',  cls:'has-fee' });
  if (clean(loc.vehiclePassAmount) && clean(loc.vehiclePassAmount) !== '0') badges.push({ label:'Vehicle pass', cls:'has-fee' });
  if (!badges.length) badges.push({ label:'No fees', cls:'none' });
  return badges;
}

function allTags(loc) {
  return [...(loc.amenityTags||[]), ...(loc.tags||[])].map(t => t.toLowerCase().trim());
}

function applyFilters(locs) {
  return locs.filter(loc => {
    const tags = allTags(loc);
    return FILTER_DEFS.every(fd => !flow.filters[fd.key] || fd.check(loc, tags));
  });
}

function activeFilterCount() {
  return Object.values(flow.filters).filter(Boolean).length;
}

// ===================================================================
// STEP 1 — State (dropdown)
// ===================================================================
function renderStep1() {
  flow.step = 1; updateProgress();
  destroyMap();
  document.getElementById('stage').className = '';
  document.getElementById('stage').style.cssText = '';
  document.getElementById('stage').innerHTML = `
    <div class="stage">
      <div class="step">
        <h1>Pick Your Location</h1>
        <p>Welcome! Now that you're booked, let's find the perfect spot for your shoot. This will take about 5 minutes.</p>

        <p class="label" style="margin-top:12px;">Where is your shoot?</p>
        <select class="input" id="state-select" style="cursor:pointer;">
          <option value="" disabled ${!flow.state?'selected':''}>Select a state…</option>
          <option value="UT" ${flow.state==='UT'?'selected':''}>Utah</option>
          <option value="CA" ${flow.state==='CA'?'selected':''}>California</option>
        </select>

        <div class="btn-row">
          <span></span>
          <button class="btn" id="next-1" ${flow.state?'':'disabled'}>Continue →</button>
        </div>
      </div>
    </div>`;

  const sel = $('#state-select'), next = $('#next-1');
  sel.addEventListener('change', () => {
    flow.state = sel.value;
    next.disabled = false;
  });
  next.addEventListener('click', () => renderStep2());
}

// ===================================================================
// STEP 2 — City
// ===================================================================
function renderStep2() {
  flow.step = 2; updateProgress();
  destroyMap();
  document.getElementById('stage').className = '';
  document.getElementById('stage').style.cssText = '';
  document.getElementById('stage').innerHTML = `
    <div class="stage">
      <div class="step">
        <h1>Where in ${STATE_NAMES[flow.state] || 'your state'}?</h1>
        <p>Type the city or zip code closest to you. We'll show you spots within your driving range.</p>
        <p class="label">Your city or zip</p>
        <input class="input" id="city-input" placeholder="e.g. Provo, 84601, or Park City" autofocus value="${flow.city||''}" />
        <p class="small-note" id="city-status"></p>
        <div class="btn-row">
          <button class="btn btn-secondary" id="back-2">← Back</button>
          <button class="btn" id="next-2" ${flow.city?'':'disabled'}>Continue →</button>
        </div>
      </div>
    </div>`;

  const input = $('#city-input'), next = $('#next-2');
  input.addEventListener('input', () => {
    next.disabled = input.value.trim().length < 2;
    flow.cityCoords = null;
    $('#city-status').textContent = '';
  });
  input.addEventListener('keydown', e => { if (e.key === 'Enter' && !next.disabled) next.click(); });
  $('#back-2').addEventListener('click', () => renderStep1());
  next.addEventListener('click', async () => {
    flow.city = input.value.trim();
    next.disabled = true; next.textContent = 'Locating…';
    $('#city-status').textContent = 'Finding your city…';
    const coords = await geocodeCity(flow.city, flow.state);
    if (!coords) {
      $('#city-status').textContent = "Couldn't find that. Try a zip code or nearby town.";
      next.disabled = false; next.textContent = 'Continue →'; return;
    }
    flow.cityCoords = coords;
    renderStep3();
  });
}

// ===================================================================
// STEP 3 — Drive time
// ===================================================================
function renderStep3() {
  flow.step = 3; updateProgress();
  destroyMap();
  document.getElementById('stage').className = '';
  document.getElementById('stage').style.cssText = '';
  document.getElementById('stage').innerHTML = `
    <div class="stage">
      <div class="step">
        <h1>How far are you willing to drive?</h1>
        <p>We'll only show locations within this drive time of <strong>${flow.city}</strong>.</p>
        <div class="options" id="drive-opts">
          ${DRIVE_OPTS.map(o => `
            <button class="option ${flow.driveMins===o.mins?'active':''}" data-mins="${o.mins}">
              <div class="o-label">${o.label}</div>
              <div class="o-sub">${o.sub}</div>
            </button>`).join('')}
        </div>
        <div class="btn-row">
          <button class="btn btn-secondary" id="back-3">← Back</button>
          <button class="btn" id="next-3" ${flow.driveMins?'':'disabled'}>Continue →</button>
        </div>
      </div>
    </div>`;

  document.querySelectorAll('#drive-opts .option').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#drive-opts .option').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      flow.driveMins = parseInt(btn.dataset.mins, 10);
      $('#next-3').disabled = false;
    });
  });
  $('#back-3').addEventListener('click', () => renderStep2());
  $('#next-3').addEventListener('click', () => renderStep4());
}

// ===================================================================
// STEP 4 — Season picker
// ===================================================================
function renderStep4() {
  flow.step = 4; updateProgress();
  destroyMap();
  document.getElementById('stage').className = '';
  document.getElementById('stage').style.cssText = '';
  document.getElementById('stage').innerHTML = `
    <div class="stage">
      <div class="step">
        <h1>When is your shoot?</h1>
        <p>We'll show locations that are best for that time of year.</p>
        <div class="options" id="season-opts" style="grid-template-columns:repeat(2,1fr);">
          ${SEASONS.map(s => `
            <button class="option ${flow.season===s.id?'active':''}" data-season="${s.id}">
              <div class="o-label">${s.label}</div>
              <div class="o-sub">${s.sub}</div>
            </button>`).join('')}
        </div>
        <div class="btn-row">
          <button class="btn btn-secondary" id="back-4s">← Back</button>
          <button class="btn" id="next-4s" ${flow.season?'':'disabled'}>Show me spots →</button>
        </div>
      </div>
    </div>`;

  document.querySelectorAll('#season-opts .option').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#season-opts .option').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      flow.season = btn.dataset.season;
      $('#next-4s').disabled = false;
    });
  });
  $('#back-4s').addEventListener('click', () => renderStep3());
  $('#next-4s').addEventListener('click', () => renderStep5map());
}

// ===================================================================
// STEP 5 — Map + Sidebar
// ===================================================================
async function renderStep5map() {
  flow.step = 5; updateProgress();
  destroyMap();

  if (!LOCATIONS || LOCATIONS.length === 0) {
    document.getElementById('stage').innerHTML = `<div class="stage"><div class="step" style="text-align:center;"><h2>Loading locations…</h2><p>Just a moment.</p></div></div>`;
    await dataPromise;
    if (!LOCATIONS || LOCATIONS.length === 0) {
      document.getElementById('stage').innerHTML = `<div class="stage"><div class="step" style="text-align:center;"><h2>Couldn't load locations.</h2><p>Please refresh the page.</p></div></div>`;
      return;
    }
  }

  const seasonLabel = SEASONS.find(s => s.id === flow.season)?.label || '';

  // Full-screen map view
  const el = document.getElementById('stage');
  el.style.cssText = 'padding:0; margin:0; max-width:none;';
  el.innerHTML = `
    <div class="map-view">
      <!-- Controls bar -->
      <div class="map-controls">
        <div class="map-controls-left">Emily Sharon</div>
        <div class="map-ctx">
          <strong>${seasonLabel}</strong> · ${flow.driveMins} min of
          <strong>${flow.city}</strong>
          <span class="map-ctx-change" id="change-city">change</span>
        </div>
        <div class="map-controls-right">
          <span class="grid-count" id="grid-count"></span>
          <select class="drive-select" id="drive-quick">
            ${DRIVE_OPTS.map(o => `<option value="${o.mins}" ${flow.driveMins===o.mins?'selected':''}>${o.label}</option>`).join('')}
          </select>
          <div class="filter-wrap">
            <button class="filter-btn ${flow.filterOpen?'open':''}" id="filter-btn">
              ⚙ Filters
              <span class="filter-active-badge ${activeFilterCount()>0?'show':''}" id="filter-badge">${activeFilterCount()}</span>
              ▾
            </button>
            <div class="filter-panel ${flow.filterOpen?'open':''}" id="filter-panel">
              <div class="filter-panel-title">Filter locations</div>
              ${FILTER_DEFS.map(fd => `
                <div class="filter-row" data-key="${fd.key}">
                  <span class="filter-row-label">${fd.label}</span>
                  <div class="toggle ${flow.filters[fd.key]?'on':''}" data-key="${fd.key}">
                    <div class="toggle-knob"></div>
                  </div>
                </div>`).join('')}
              <div class="filter-clear-row">
                <button class="filter-clear-btn" id="clear-filters">Clear all</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Map + sidebar -->
      <div class="map-body">
        <div id="leaflet-map"></div>
        <div class="loc-sidebar" id="loc-sidebar"></div>
      </div>

      <!-- Pick bar -->
      <div class="pick-bar">
        <div class="pick-bar-info" id="pick-info">Click a pin or card to select a location</div>
        <div class="pick-bar-right">
          <button class="btn btn-secondary btn-small" id="back-4">← Back</button>
          <button class="btn btn-small" id="next-4" disabled>Pick this spot →</button>
        </div>
      </div>
    </div>`;

  // Wire controls
  $('#change-city').addEventListener('click', () => renderStep2());
  $('#drive-quick').addEventListener('change', e => {
    flow.driveMins = parseInt(e.target.value, 10);
    flow.pickedLocation = null;
    resetPickBar();
    refreshView();
  });
  $('#back-4').addEventListener('click', () => renderStep4());
  $('#next-4').addEventListener('click', () => { if (flow.pickedLocation) renderStep6(); });

  // Filter dropdown
  $('#filter-btn').addEventListener('click', e => {
    e.stopPropagation();
    flow.filterOpen = !flow.filterOpen;
    $('#filter-panel').classList.toggle('open', flow.filterOpen);
    $('#filter-btn').classList.toggle('open', flow.filterOpen);
  });
  document.addEventListener('click', closeFilterOnOutside);

  // Toggle clicks
  document.querySelectorAll('.filter-row').forEach(row => {
    row.addEventListener('click', () => {
      const key = row.dataset.key;
      flow.filters[key] = !flow.filters[key];
      row.querySelector('.toggle').classList.toggle('on', flow.filters[key]);
      updateFilterBadge();
      flow.pickedLocation = null;
      resetPickBar();
      refreshView();
    });
  });

  $('#clear-filters').addEventListener('click', e => {
    e.stopPropagation();
    flow.filters = emptyFilters();
    document.querySelectorAll('.toggle').forEach(t => t.classList.remove('on'));
    updateFilterBadge();
    flow.pickedLocation = null;
    resetPickBar();
    refreshView();
  });

  // Init map + load data
  setTimeout(() => {
    initMap();
    refreshView();
  }, 50);
}

function closeFilterOnOutside(e) {
  const panel = $('#filter-panel');
  const btn   = $('#filter-btn');
  if (panel && !panel.contains(e.target) && btn && !btn.contains(e.target)) {
    flow.filterOpen = false;
    panel.classList.remove('open');
    btn && btn.classList.remove('open');
  }
}

// ===================================================================
// MAP
// ===================================================================
function initMap() {
  if (leafletMap) return; // already initialized
  const container = document.getElementById('leaflet-map');
  if (!container) return;

  leafletMap = L.map('leaflet-map', { zoomControl: true });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a> contributors',
    maxZoom: 18
  }).addTo(leafletMap);

  if (flow.cityCoords) {
    leafletMap.setView([flow.cityCoords.lat, flow.cityCoords.lng], 10);
  }
}

function destroyMap() {
  if (leafletMap) {
    leafletMap.remove();
    leafletMap = null;
    mapMarkers = {};
  }
  document.removeEventListener('click', closeFilterOnOutside);
}

function pinColor(loc) {
  return '#8a9b80';
}

function makeIcon(loc, selected = false) {
  const color = pinColor(loc);
  const size = selected ? 20 : 13;
  return L.divIcon({
    className: '',
    html: `<div class="map-pin ${selected?'selected':''}" style="background:${color};width:${size}px;height:${size}px;"></div>`,
    iconSize:   [size, size],
    iconAnchor: [size/2, size/2],
  });
}

function refreshView() {
  if (!flow.cityCoords) return;

  const withDrive = LOCATIONS
    .map(loc => ({ ...loc, driveMins: estimateDriveMins(flow.cityCoords, loc), miles: haversineMiles(flow.cityCoords, loc) }))
    .filter(loc => loc.lat && loc.lng)
    .filter(loc => isActiveInSeason(loc, flow.season))
    .filter(loc => loc.driveMins <= flow.driveMins)
    .sort((a,b) => a.driveMins - b.driveMins);

  currentFiltered = applyFilters(withDrive);

  // Update count
  const countEl = $('#grid-count');
  if (countEl) countEl.textContent = `${currentFiltered.length} spot${currentFiltered.length !== 1 ? 's' : ''} found`;

  // Rebuild map markers
  if (leafletMap) {
    // Remove old markers
    Object.values(mapMarkers).forEach(m => m.remove());
    mapMarkers = {};

    currentFiltered.forEach(loc => {
      const marker = L.marker([loc.lat, loc.lng], { icon: makeIcon(loc) })
        .addTo(leafletMap)
        .on('click', () => selectLocation(loc.id));
      mapMarkers[loc.id] = marker;
    });

    if (currentFiltered.length > 0) {
      const bounds = L.latLngBounds(currentFiltered.map(l => [l.lat, l.lng]));
      leafletMap.fitBounds(bounds, { padding: [30, 30] });
    }
  }

  // Rebuild sidebar
  const sidebar = $('#loc-sidebar');
  if (!sidebar) return;

  if (currentFiltered.length === 0) {
    sidebar.innerHTML = `<div class="no-results"><h3>No spots found</h3><p>Try a longer drive time, different filters, or a different season.</p></div>`;
    return;
  }

  sidebar.innerHTML = currentFiltered.map(loc => buildCard(loc)).join('');
  document.querySelectorAll('.loc-card').forEach(card => {
    card.addEventListener('click', () => selectLocation(card.dataset.id));
  });

  // Re-highlight selected card if still in list
  if (flow.pickedLocation && mapMarkers[flow.pickedLocation.id]) {
    const card = document.querySelector(`.loc-card[data-id="${flow.pickedLocation.id}"]`);
    if (card) card.classList.add('selected');
  }
}

function buildCard(loc) {
  const photo = getPhotoForSeason(loc, flow.season);
  const photoHTML = photo
    ? `<img class="loc-photo" src="${photo.url}" alt="${(photo.caption||loc.name).replace(/"/g,'&quot;')}" loading="lazy" />`
    : `<div class="loc-photo-placeholder">${loc.name}</div>`;

  const lvl = getAccessClass(loc.accessibilityLevel);
  const accessBadge = loc.accessibilityLevel
    ? `<span class="access-badge ${lvl}"><span class="access-dot"></span>${loc.accessibilityLevel}</span>` : '';
  const accessText = loc.accessibility
    ? `<span class="access-text">${loc.accessibility}</span>` : '';
  const accessHTML = (accessBadge || accessText) ? `<div class="loc-access">${accessBadge}${accessText}</div>` : '';

  const sceneTags  = (loc.tags||[]).filter(Boolean).map(t => `<span class="tag scene">${t}</span>`).join('');
  const amenTags   = (loc.amenityTags||[]).filter(Boolean).map(t => `<span class="tag amenity">${t}</span>`).join('');
  const tagsHTML   = (sceneTags||amenTags) ? `<div class="loc-tags">${sceneTags}${amenTags}</div>` : '';

  const fees = getFeeBadges(loc);
  const feesHTML = `<div class="loc-fees"><span class="fees-label">Fees:</span>${fees.map(f=>`<span class="fee-badge ${f.cls}">${f.label}</span>`).join('')}</div>`;

  const desc = (loc.description||loc.notes||'').trim();
  const isSelected = flow.pickedLocation && flow.pickedLocation.id === loc.id;

  return `
    <div class="loc-card ${isSelected?'selected':''}" data-id="${loc.id}">
      ${photoHTML}
      <div class="loc-body">
        <div class="loc-name">${loc.name}</div>
        <div class="loc-dist">~${Math.round(loc.driveMins)} min · ${Math.round(loc.miles)} mi from ${flow.city}</div>
        ${desc ? `<div class="loc-desc">${desc}</div>` : ''}
        ${loc.bestTimeOfDay ? `<div class="loc-time">🕐 <span class="loc-time-val">${loc.bestTimeOfDay}</span></div>` : ''}
        ${accessHTML}
        ${tagsHTML}
        ${feesHTML}
      </div>
    </div>`;
}

function selectLocation(id) {
  const loc = currentFiltered.find(l => l.id === id);
  if (!loc) return;
  flow.pickedLocation = loc;

  // Update card highlights
  document.querySelectorAll('.loc-card').forEach(c => c.classList.toggle('selected', c.dataset.id === id));

  // Update map pin sizes
  Object.entries(mapMarkers).forEach(([mid, marker]) => {
    const locForMarker = currentFiltered.find(l => l.id === mid);
    if (locForMarker) marker.setIcon(makeIcon(locForMarker, mid === id));
  });

  // Fly to location
  if (leafletMap && loc.lat && loc.lng) {
    leafletMap.flyTo([loc.lat, loc.lng], 13, { duration: 0.8 });
  }

  // Scroll card into view
  const card = document.querySelector(`.loc-card[data-id="${id}"]`);
  if (card) card.scrollIntoView({ behavior:'smooth', block:'nearest' });

  // Enable pick button
  const btn = $('#next-4'); if (btn) btn.disabled = false;
  const info = $('#pick-info'); if (info) info.innerHTML = `Selected: <strong>${loc.name}</strong>`;
}

function resetPickBar() {
  const btn = $('#next-4'); if (btn) btn.disabled = true;
  const info = $('#pick-info'); if (info) info.textContent = 'Click a pin or card to select a location';
}

function updateFilterBadge() {
  const n = activeFilterCount();
  const badge = $('#filter-badge');
  if (badge) { badge.textContent = n; badge.classList.toggle('show', n > 0); }
}

// ===================================================================
// STEP 6 — Confirmation + Payment
// ===================================================================
function renderStep6() {
  flow.step = 6; updateProgress();
  destroyMap();
  document.getElementById('stage').style.cssText = '';
  const loc = flow.pickedLocation;
  const seasonLabel = SEASONS.find(s => s.id === flow.season)?.label || '';

  document.getElementById('stage').innerHTML = `
    <div class="stage">
      <div class="step">
        <div class="card">
          <h2>Good choice! ✨</h2>
          <p>Your booking is updated with <strong>${loc.name}</strong>.</p>
          <p>
            <span class="pill">${loc.type || 'outdoor'}</span>
            <span class="pill">${seasonLabel}</span>
            <span class="pill">~${Math.round(loc.driveMins)} min from ${flow.city}</span>
          </p>
          ${loc.accessibility ? `<p style="font-size:0.9rem;color:var(--sage-dk);">♿ ${loc.accessibility}</p>` : ''}
          ${(loc.description||loc.notes) ? `<p style="font-style:italic;font-size:0.9rem;">${loc.description||loc.notes}</p>` : ''}
          <button class="change-loc-btn" id="change-loc">← Change my location</button>
        </div>

        <div class="card" style="margin-top:20px;">
          <h2>Last step — secure your booking</h2>
          <p>Pay your <strong>$50 deposit</strong> to lock in your spot. The remainder is due when you receive your photos.</p>
          <label class="check-row">
            <input type="checkbox" id="terms" />
            <span>I agree to the <a href="#" onclick="alert('Contract coming soon'); return false;">terms &amp; conditions</a> and photoshoot contract.</span>
          </label>
          <div class="pay-options">
            <button class="btn stripe-btn" id="pay-stripe" disabled>Pay $50 with Stripe</button>
          </div>
          <p class="deposit-note">Once your deposit is paid, you'll receive a confirmation text with the Google Maps link, parking info, and an outfit guide.</p>
        </div>
      </div>
    </div>`;

  $('#change-loc').addEventListener('click', () => renderStep5map());
  $('#terms').addEventListener('change', e => {
    flow.termsAccepted = e.target.checked;
    $('#pay-stripe').disabled = !flow.termsAccepted;
  });
  $('#pay-stripe').addEventListener('click', () => alert('This will redirect to your Stripe Payment Link.'));
}

// ===================================================================
// INIT
// ===================================================================
renderStep1();
</script>
</body>
</html>
